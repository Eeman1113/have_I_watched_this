<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Have I Watched This?</title>
<script>(function(){if(localStorage.getItem('hiw:dark')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:         hsl(0,0%,98%);
  --surface:    hsl(0,0%,100%);
  --surface2:   hsl(220,14%,96%);
  --surface3:   hsl(220,13%,93%);
  --border:     hsl(220,13%,90%);
  --border2:    hsl(220,13%,82%);
  --fg:         hsl(224,71%,4%);
  --fg2:        hsl(220,9%,38%);
  --fg3:        hsl(220,9%,56%);
  --green:      hsl(142,69%,42%);
  --green-bg:   hsl(142,76%,96%);
  --green-bd:   hsl(142,55%,82%);
  --green-fg:   hsl(142,72%,26%);
  --gold:       hsl(43,96%,48%);
  --warn-bg:    hsl(43,96%,95%);
  --warn-bd:    hsl(43,90%,76%);
  --warn-fg:    hsl(43,80%,22%);
  --err-bg:     hsl(0,86%,97%);
  --err-bd:     hsl(0,80%,85%);
  --err-fg:     hsl(0,72%,34%);
  --radius:     12px;
  --radius-sm:  8px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.05);
  --shadow:     0 4px 20px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
  --font:       'Poppins',ui-sans-serif,system-ui,sans-serif;
  --font-logo:  'Cedarville Cursive',cursive;
  --hdr-bg:     rgba(255,255,255,.88);
}

[data-theme="dark"]{
  --bg:         hsl(0,0%,4%);
  --surface:    hsl(0,0%,7%);
  --surface2:   hsl(0,0%,10%);
  --surface3:   hsl(0,0%,13%);
  --border:     hsl(0,0%,14%);
  --border2:    hsl(0,0%,22%);
  --fg:         hsl(0,0%,94%);
  --fg2:        hsl(0,0%,58%);
  --fg3:        hsl(0,0%,36%);
  --green:      hsl(142,52%,46%);
  --green-bg:   hsl(142,25%,8%);
  --green-bd:   hsl(142,32%,16%);
  --green-fg:   hsl(142,58%,56%);
  --gold:       hsl(43,95%,56%);
  --warn-bg:    hsl(43,30%,8%);
  --warn-bd:    hsl(43,40%,18%);
  --warn-fg:    hsl(43,85%,62%);
  --err-bg:     hsl(0,30%,8%);
  --err-bd:     hsl(0,38%,18%);
  --err-fg:     hsl(0,70%,60%);
  --shadow-sm:  0 1px 4px rgba(0,0,0,.6);
  --shadow:     0 6px 28px rgba(0,0,0,.7),0 1px 4px rgba(0,0,0,.4);
  --hdr-bg:     rgba(10,10,10,.92);
}

html{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
body{min-height:100vh}

/* ── NProgress ── */
#npbar{
  position:fixed;top:0;left:0;right:0;height:2px;background:var(--fg);
  transform-origin:left;transform:scaleX(0);opacity:1;
  transition:transform .3s ease,opacity .5s ease;z-index:9999;pointer-events:none;
}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:var(--hdr-bg);
  backdrop-filter:blur(16px) saturate(180%);
  border-bottom:1px solid var(--border);
  transition:background .2s,border-color .2s;
}
.hdr-inner{
  max-width:1460px;margin:0 auto;padding:0 24px;
  height:60px;display:flex;align-items:center;gap:12px;
}

/* ── LOGO ── */
.logo{
  font-family:var(--font-logo);font-size:19px;line-height:1;
  color:var(--fg);white-space:nowrap;flex-shrink:0;
  letter-spacing:0.02em;text-decoration:none;
  display:flex;align-items:baseline;gap:0;
}
.logo-q{opacity:.32;font-size:21px}

/* ── SEARCH ── */
.srch{position:relative;flex:1;max-width:340px;display:flex;align-items:center}
.srch-ico{position:absolute;left:11px;color:var(--fg3);pointer-events:none;display:flex}
.srch-ico svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round}
.srch-in{
  width:100%;height:36px;padding:0 32px 0 33px;
  font-family:var(--font);font-size:12.5px;font-weight:400;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface2);color:var(--fg);outline:none;
  transition:border-color .15s,box-shadow .15s,background .2s;
}
.srch-in:focus{
  border-color:var(--border2);background:var(--surface);
  box-shadow:0 0 0 3px rgba(0,0,0,.06);
}
[data-theme="dark"] .srch-in:focus{box-shadow:0 0 0 3px rgba(255,255,255,.06)}
.srch-in::placeholder{color:var(--fg3)}
.srch-x{
  position:absolute;right:10px;display:none;align-items:center;
  background:none;border:none;cursor:pointer;color:var(--fg3);
  padding:2px;border-radius:3px;transition:color .15s;
}
.srch-x svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round}
.srch-x:hover{color:var(--fg)}
.srch-x.on{display:flex}

/* ── HEADER RIGHT ── */
.hdr-r{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}

/* ── STAT ── */
.stat{
  font-size:11.5px;color:var(--fg2);padding:5px 12px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface2);
  white-space:nowrap;transition:all .2s;font-weight:400;
}
.stat b{color:var(--fg);font-weight:600}
.stat.green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-fg)}
.stat.green b{color:var(--green-fg)}

/* ── LANG PICKER ── */
.lang-pick{
  display:flex;align-items:center;
  border:1px solid var(--border);border-radius:20px;
  overflow:hidden;background:var(--surface2);
  transition:border-color .2s,background .2s;
  flex-shrink:0;
}
.lang-btn{
  font-family:var(--font);font-size:11px;font-weight:500;
  padding:5px 11px;cursor:pointer;border:none;
  background:transparent;color:var(--fg3);
  transition:all .15s;letter-spacing:0.05em;line-height:1;
}
.lang-btn.on{background:var(--fg);color:var(--bg);border-radius:20px}
.lang-btn:not(.on):hover{color:var(--fg)}

/* ── DARK MODE TOGGLE ── */
.dm-btn{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;color:var(--fg2);transition:all .15s;flex-shrink:0;
}
.dm-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.dm-btn:hover{background:var(--surface3);color:var(--fg);border-color:var(--border2)}

/* ── EXPORT BUTTON ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:36px;padding:0 16px;cursor:pointer;
  font-family:var(--font);font-size:12px;font-weight:500;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface);color:var(--fg);
  transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn:active{transform:scale(.98)}
.btn.solid{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.btn.solid:hover{opacity:.86}

/* ── FILTERS ── */
.fbar{border-bottom:1px solid var(--border);background:var(--surface);transition:background .2s,border-color .2s}
.fbar-inner{
  max-width:1460px;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;gap:4px;height:46px;
}
.tab{
  height:32px;padding:0 14px;
  font-family:var(--font);font-size:12px;font-weight:400;color:var(--fg3);
  border:1px solid transparent;border-radius:20px;
  background:transparent;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.tab:hover{background:var(--surface2);color:var(--fg)}
.tab.on{background:var(--fg);border-color:var(--fg);color:var(--bg);font-weight:500}
.cnt{
  font-size:10.5px;font-weight:500;
  padding:1px 7px;border-radius:10px;min-width:18px;text-align:center;
}
.tab.on .cnt{background:rgba(255,255,255,.2);color:inherit}
.tab:not(.on) .cnt{background:var(--surface3);color:var(--fg3);border:1px solid var(--border)}

/* ── MAIN ── */
.main{max-width:1460px;margin:0 auto;padding:24px 24px 80px}

/* ── BANNERS ── */
.banner{
  display:none;align-items:center;gap:8px;
  font-size:12px;padding:10px 14px;border-radius:var(--radius-sm);
  margin-bottom:16px;border:1px solid;font-weight:400;
}
.banner.on{display:flex}
.banner svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;flex-shrink:0}
.banner.warn{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn-fg)}
.banner.err{background:var(--err-bg);border-color:var(--err-bd);color:var(--err-fg)}
.banner-btn{
  margin-left:auto;font-family:var(--font);font-size:11px;cursor:pointer;
  background:none;border:1px solid;border-radius:20px;padding:3px 12px;
  font-weight:500;transition:background .15s;
}
.banner.err .banner-btn{border-color:var(--err-bd);color:var(--err-fg)}
.banner.err .banner-btn:hover{background:hsl(0,80%,94%)}
[data-theme="dark"] .banner.err .banner-btn:hover{background:hsl(0,25%,16%)}

/* ── LOAD PROGRESS ── */
.lprog{display:none;margin-bottom:20px}
.lprog.on{display:block}
.ltrack{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px}
.lfill{height:100%;width:0%;background:var(--fg);border-radius:2px;transition:width .35s ease}
.lstatus{font-size:11.5px;color:var(--fg3);display:flex;align-items:center;gap:6px}
.lstatus svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;animation:spin 1s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:12px}

/* ── CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:box-shadow .18s,border-color .18s,transform .18s;
  cursor:pointer;
}
.card:hover{box-shadow:var(--shadow);border-color:var(--border2);transform:translateY(-2px)}
.card.watched{border-color:var(--green-bd)}

.poster{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--surface2)}
.poster img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .35s}
.poster img.ok{opacity:1}
.pfallback{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:7px;color:var(--fg3);
  font-size:10px;text-align:center;padding:12px;
}
.pfallback svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;opacity:.28}

.b-rank,.b-score{
  position:absolute;top:8px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(4px);
  font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:20px;
  border:1px solid rgba(0,0,0,.06);line-height:1.6;
}
[data-theme="dark"] .b-rank,[data-theme="dark"] .b-score{
  background:rgba(0,0,0,.78);border-color:rgba(255,255,255,.08);color:white
}
.b-rank{left:8px;color:var(--fg2)}
.b-score{right:8px;color:var(--fg);display:flex;align-items:center;gap:2px}
.b-score .s{color:var(--gold)}

.veil{
  position:absolute;inset:0;background:rgba(0,0,0,.28);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.card.watched .veil{opacity:1}
.vcheck{
  width:40px;height:40px;border-radius:50%;background:white;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.vcheck svg{width:18px;height:18px;stroke:var(--green-fg);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ── CARD BODY ── */
.cbody{padding:10px 11px 11px}
.ctitle{
  font-size:12px;font-weight:500;line-height:1.45;color:var(--fg);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:6px;
}
.cmeta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.ctag{
  font-size:10px;color:var(--fg3);font-weight:400;
  background:var(--surface2);border:1px solid var(--border);
  padding:2px 8px;border-radius:20px;white-space:nowrap;
  max-width:120px;overflow:hidden;text-overflow:ellipsis;
}
.cdot{width:2px;height:2px;border-radius:50%;background:var(--border2);flex-shrink:0}
.cdiv{height:1px;background:var(--border);margin-bottom:10px}

/* ── SWITCH ROW ── */
.swrow{display:flex;align-items:center;justify-content:space-between}
.swlabel{
  font-size:11px;color:var(--fg3);display:flex;align-items:center;gap:5px;
  font-weight:400;transition:color .18s;
}
.swlabel svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.card.watched .swlabel{color:var(--green-fg)}

.sw{position:relative;display:inline-block;width:32px;height:18px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.trk{
  position:absolute;inset:0;cursor:pointer;
  background:var(--border2);border-radius:18px;transition:background .2s;
}
.trk::after{
  content:'';position:absolute;width:12px;height:12px;border-radius:50%;
  top:3px;left:3px;background:white;
  box-shadow:0 1px 2px rgba(0,0,0,.18);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
}
.sw input:checked+.trk{background:var(--green)}
.sw input:checked+.trk::after{transform:translateX(14px)}
.sw input:focus-visible+.trk{box-shadow:0 0 0 3px rgba(0,0,0,.1)}
[data-theme="dark"] .sw input:focus-visible+.trk{box-shadow:0 0 0 3px rgba(255,255,255,.14)}

/* ── SKELETON ── */
.skel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.sk-p{aspect-ratio:2/3;background:var(--surface2);position:relative;overflow:hidden}
.sk-p::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(128,128,128,.07),transparent);
  animation:shim 1.4s ease-in-out infinite;
}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sk-b{padding:10px 11px 11px}
.sk-l{height:9px;background:var(--surface2);border-radius:3px;margin-bottom:7px}
.sk-l.w6{width:60%}.sk-l.w4{width:40%}

/* ── EMPTY ── */
.empty{grid-column:1/-1;padding:80px 20px;text-align:center}
.eico{
  width:44px;height:44px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;color:var(--fg3);
}
.eico svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round}
.empty h3{font-size:13.5px;font-weight:500;color:var(--fg);margin-bottom:5px}
.empty p{font-size:12px;color:var(--fg3);max-width:240px;margin:0 auto;font-weight:400}

/* ── SENTINEL (virtualization trigger) ── */
.sentinel{grid-column:1/-1;height:1px;pointer-events:none;visibility:hidden}

/* ── VIEW MORE ── */
.vm-wrap{display:none;text-align:center;margin-top:28px}
.vm-wrap.on{display:block}

/* ── PAGE ROUTING ── */
/* Home is shown by default. When body gains .watching we swap to the watch
   page and hide the filter tabs. Using display flips means only one page
   lives in layout at a time — scroll, focus, and paint all stay clean. */
.home-page{display:block}
.watch-page{display:none}
body.watching .home-page{display:none}
body.watching .watch-page{display:block}
body.watching .fbar{display:none}

/* ── WATCH PAGE ── */
.watch-page{
  max-width:1460px;margin:0 auto;padding:20px 24px 80px;
  animation:fadeIn .18s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.w-top{
  display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;
}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  height:34px;padding:0 14px;
  font-family:var(--font);font-size:12px;font-weight:500;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface);color:var(--fg);
  cursor:pointer;transition:all .15s;
}
.back-btn:hover{background:var(--surface2);border-color:var(--border2)}
.back-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.w-crumb{font-size:13px;color:var(--fg3);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.w-crumb b{color:var(--fg);font-weight:500}

.w-layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) 340px;
  gap:20px;align-items:start;
}
.w-main{min-width:0;display:flex;flex-direction:column;gap:16px}
.w-side{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  max-height:calc(100vh - 100px);
  display:flex;flex-direction:column;
  position:sticky;top:80px;
}

/* Video frame */
.v-frame{
  position:relative;width:100%;aspect-ratio:16/9;
  background:#000;border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);
}
.v-frame iframe{
  position:absolute;inset:0;width:100%;height:100%;border:0;display:block;
}
.v-empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:#9aa;font-size:13px;text-align:center;padding:30px;
}
.v-empty svg{width:30px;height:30px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;opacity:.5}

/* Player controls row */
.w-ctrls{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  padding:12px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);
}
.w-ctrls-lbl{
  font-size:10.5px;font-weight:600;color:var(--fg3);
  text-transform:uppercase;letter-spacing:0.06em;
  margin-right:4px;
}
.src-pick{display:flex;gap:5px;flex-wrap:wrap}
.src-btn{
  height:28px;padding:0 11px;
  font-family:var(--font);font-size:11px;font-weight:500;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface2);color:var(--fg3);
  cursor:pointer;transition:all .15s;
  display:inline-flex;align-items:center;gap:5px;
}
.src-btn:hover{color:var(--fg);border-color:var(--border2)}
.src-btn.on{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.src-btn.ext{border-style:dashed}
.src-btn.ext.on{border-style:solid}
.src-ext-ico{
  width:10px;height:10px;stroke:currentColor;stroke-width:2;
  fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:.7;
}

.dub-tog{
  display:flex;align-items:center;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:2px;margin-left:auto;
}
.dub-tog button{
  height:24px;padding:0 11px;
  font-family:var(--font);font-size:10.5px;font-weight:500;
  border:none;background:transparent;color:var(--fg3);
  border-radius:18px;cursor:pointer;transition:all .15s;
  letter-spacing:0.03em;
}
.dub-tog button.on{background:var(--fg);color:var(--bg)}

.ext-link{
  display:inline-flex;align-items:center;gap:5px;
  height:28px;padding:0 11px;
  font-family:var(--font);font-size:11px;font-weight:500;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface);color:var(--fg2);
  cursor:pointer;transition:all .15s;text-decoration:none;
}
.ext-link:hover{background:var(--surface2);color:var(--fg);border-color:var(--border2)}
.ext-link svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* Anime info panel */
.w-info{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  display:flex;gap:16px;padding:16px 18px;
}
.w-info-poster{
  width:96px;flex-shrink:0;aspect-ratio:2/3;
  border-radius:8px;overflow:hidden;
  background:var(--surface2);border:1px solid var(--border);
}
.w-info-poster img{width:100%;height:100%;object-fit:cover;display:block}
.w-info-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
.w-info-ep{font-size:11px;color:var(--fg3);font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.w-title{font-size:18px;font-weight:600;color:var(--fg);line-height:1.3}
.w-sub{font-size:12px;color:var(--fg3);line-height:1.5}
.w-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.w-chip{
  font-size:10.5px;color:var(--fg2);font-weight:400;
  background:var(--surface2);border:1px solid var(--border);
  padding:3px 9px;border-radius:20px;
  display:inline-flex;align-items:center;gap:4px;
}
.w-chip.wd{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-fg);font-weight:500;cursor:pointer}
.w-chip.wd svg{width:10px;height:10px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.w-chip.add{cursor:pointer;border-style:dashed}
.w-chip.add:hover{color:var(--fg);border-color:var(--border2)}

.w-syn-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px 18px;
}
.w-syn-lbl{
  font-size:10.5px;font-weight:600;color:var(--fg3);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;
}
.w-syn{font-size:12.5px;color:var(--fg2);line-height:1.65}
.w-syn.clamp{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.w-more{
  font-size:11px;color:var(--fg3);cursor:pointer;
  background:none;border:none;padding:4px 0 0;
  font-family:var(--font);font-weight:500;
}
.w-more:hover{color:var(--fg)}

/* Episode nav buttons above video */
.ep-nav{display:flex;gap:8px}
.ep-nav button{
  flex:1;height:34px;padding:0 12px;
  font-family:var(--font);font-size:11.5px;font-weight:500;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface);color:var(--fg);
  cursor:pointer;transition:all .15s;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.ep-nav button:hover:not(:disabled){background:var(--surface2);border-color:var(--border2)}
.ep-nav button:disabled{opacity:.4;cursor:not-allowed}
.ep-nav svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* Episode sidebar */
.ep-head{
  padding:13px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--surface2);flex-shrink:0;
}
.ep-head-t{font-size:12.5px;font-weight:600;color:var(--fg)}
.ep-head .cnt{background:var(--surface3);color:var(--fg3);border:1px solid var(--border)}
.ep-jump{
  width:70px;height:26px;padding:0 10px;
  font-family:var(--font);font-size:11px;
  border:1px solid var(--border);border-radius:14px;
  background:var(--surface);color:var(--fg);outline:none;
}
.ep-jump:focus{border-color:var(--border2)}
.ep-list{
  overflow-y:auto;padding:10px;flex:1;
  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-content:start;
}
.ep-item{
  font-family:var(--font);font-size:11.5px;font-weight:500;
  aspect-ratio:1;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--fg);
  cursor:pointer;transition:all .12s;
  display:flex;align-items:center;justify-content:center;
}
.ep-item:hover{border-color:var(--border2);background:var(--surface2)}
.ep-item.on{background:var(--fg);color:var(--bg);border-color:var(--fg)}

.ep-empty{
  padding:20px 14px;font-size:12px;color:var(--fg3);text-align:center;
  display:flex;flex-direction:column;gap:10px;align-items:center;
}
.ep-input-wrap{display:flex;gap:8px;justify-content:center;align-items:center}
.ep-input{
  width:80px;height:32px;padding:0 11px;
  font-family:var(--font);font-size:12px;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface2);color:var(--fg);outline:none;text-align:center;
}
.ep-input:focus{border-color:var(--border2);background:var(--surface)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(calc(100% + 24px));
  background:var(--fg);color:var(--bg);font-size:12px;font-weight:500;
  padding:9px 16px;border-radius:20px;
  box-shadow:0 4px 20px rgba(0,0,0,.18);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  z-index:9999;white-space:nowrap;pointer-events:none;
  display:flex;align-items:center;gap:7px;
}
#toast svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
#toast.on{transform:translateX(-50%) translateY(0)}

/* ── MOBILE ── */
@media(max-width:968px){
  /* Collapse watch page to one column below laptop width. */
  .w-layout{grid-template-columns:1fr}
  .w-side{position:static;max-height:none}
  .ep-list{max-height:360px}
}
@media(max-width:768px){
  .hdr-inner{padding:0 16px;gap:8px;height:56px}
  .stat{display:none}
  .main{padding:16px 14px 70px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
  .fbar-inner{padding:0 14px;gap:2px}
  .tab{padding:0 10px;font-size:11.5px}

  .watch-page{padding:14px 14px 70px}
  .w-top{margin-bottom:14px}
  .w-crumb{font-size:12px}
  .w-info{padding:14px;gap:12px}
  .w-info-poster{width:80px}
  .w-title{font-size:15px}
  .w-syn-wrap{padding:14px}
  .w-ctrls{padding:10px 12px;gap:8px}
  .dub-tog{margin-left:0}
  .ep-list{grid-template-columns:repeat(4,1fr);max-height:280px}
}
@media(max-width:480px){
  .srch{max-width:160px}
  .btn-label{display:none}
  .lang-btn{padding:5px 9px}
}
</style>
</head>
<body>

<div id="npbar"></div>

<header>
  <div class="hdr">
    <div class="hdr-inner">
      <div class="logo">
        <span>Have I Watched This</span><span class="logo-q">?</span>
      </div>

      <div class="srch">
        <span class="srch-ico">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <input class="srch-in" id="srch" type="search" placeholder="Search anime…" autocomplete="off" spellcheck="false">
        <button class="srch-x" id="srch-x" aria-label="Clear">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="hdr-r">

</header>

<main class="main home-page" id="home-page">
  <div class="banner warn" id="b-offline">
    <svg viewBox="0 0 24 24"><path d="M1 6l4 4m14-4-4 4M5 10a11 11 0 0 1 14 0M8 13a6 6 0 0 1 8 0m-4 5h.01"/></svg>
    You're offline — showing cached data only.
  </div>
  <div class="banner err" id="b-err">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="err-msg">Something went wrong.</span>
    <button class="banner-btn" id="retry">Retry</button>
  </div>
  <div class="lprog" id="lprog">
    <div class="ltrack"><div class="lfill" id="lfill"></div></div>
    <div class="lstatus">
      <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      <span id="ltxt">Fetching anime…</span>

  </div>
  <div class="grid" id="grid"></div>
  <div class="vm-wrap" id="vm-wrap">

</main>

<section class="watch-page" id="watch-page" aria-labelledby="w-title">
  <div class="w-top">
    <button class="back-btn" id="back-btn" aria-label="Back to list">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="w-crumb" id="w-crumb"></div>
  </div>

  <div class="w-layout">
    <div class="w-main">
      <div class="v-frame" id="v-frame">
        <div class="v-empty" id="v-empty">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span>Pick an episode from the list to start watching</span>
        </div>
      </div>

      <div class="w-ctrls">
        <span class="w-ctrls-lbl">Source</span>
        <div class="src-pick" id="src-pick"></div>
        <div class="dub-tog" id="dub-tog">

          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

      <div class="ep-nav" id="ep-nav"></div>

        <input class="ep-jump" id="ep-jump" type="number" min="1" placeholder="Jump">

</section>


<div id="toast">
  <svg id="t-ico" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="t-msg"></span>
</div>

<script>
// ─── STORAGE ─────────────────────────────────────────────────────────────────
// IMPORTANT: keep LS_KEY and data shape identical so existing users keep their
// saved watchlists across this update.
const LS_KEY = 'hiw:v3';
let lsOk = false;

(function checkLS(){
  try { localStorage.setItem('__t__','1'); localStorage.removeItem('__t__'); lsOk = true; }
  catch { lsOk = false; }
})();

function lsRead() {
  if (!lsOk) return {};
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
  catch { return {}; }
}

function lsWrite(obj) {
  if (!lsOk) return;
  try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); }
  catch(e) {
    if (e && (e.name === 'QuotaExceededError' || e.code === 22))
      toast('Storage full — some data may not persist', 'warn');
  }
}

function lsAdd(anime) {
  const d = lsRead();
  d[anime.mal_id] = {
    title:         anime.title,
    title_english: anime.title_english || null,
    mal_id:        anime.mal_id,
    score:         anime.score ?? null,
    episodes:      anime.episodes ?? null,
    type:          anime.type || null,
    genres:        (anime.genres || []).map(g => g.name),
    watched_at:    new Date().toISOString()
  };
  lsWrite(d);
}

function lsDel(id) {
  const d = lsRead();
  if (id in d) { delete d[id]; lsWrite(d); }
}

// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Tuning knobs for perf. These prevent the runaway-fetch + unbounded-DOM
// growth that was freezing tabs left alone.
const MAX_PAGES         = 40;    // cap API pagination for the initial load (~1000 top anime)
const CHUNK_PAGES       = 20;    // each "View More" click loads this many pages (~500 anime)
const BATCH_SIZE        = 60;    // cards rendered per virtualization batch
const SENTINEL_MARGIN   = '1500px 0px'; // preload next batch well before visible
const SEARCH_DEBOUNCE   = 180;   // ms — smooths live search typing
const FETCH_DELAY       = 600;   // ms between pages — stays well under Jikan's per-sec cap
const MAX_RETRY         = 5;     // each failed page retries with exponential backoff

// ─── STATE ───────────────────────────────────────────────────────────────────
let allAnime = [];
let watched  = {};
let filter   = 'all';
let query    = '';
let seenIds  = new Set();
let totalPg  = null;
let aborted  = false;

// Virtualization state
let currentList   = [];  // filter/search-matched view of allAnime
let renderedCount = 0;   // how many cards are actually in the DOM

// Language state
let lang = (lsOk && localStorage.getItem('hiw:lang')) || 'en';

// Pre-load watched state from storage (unchanged data shape)
(function(){
  const d = lsRead();
  Object.keys(d).forEach(id => { watched[id] = true; });
})();

// ─── LANGUAGE HELPER ─────────────────────────────────────────────────────────
function getTitle(anime) {
  if (lang === 'en') return anime.title_english || anime.title;
  if (lang === 'ja') return anime.title_japanese || anime.title;
  return anime.title;
}

// ─── DOM ─────────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const grid    = $('grid');
const lprog   = $('lprog');
const lfill   = $('lfill');
const ltxt    = $('ltxt');
const stat    = $('stat');
const expBtn  = $('exp-btn');
const srch    = $('srch');
const srchX   = $('srch-x');
const bOffline= $('b-offline');
const bErr    = $('b-err');
const errMsg  = $('err-msg');
const retryB  = $('retry');
const npbar   = $('npbar');
const cAll    = $('c-all');
const cWatched= $('c-watched');
const cUnwatched = $('c-unwatched');
const dmBtn   = $('dm-btn');
const dmIco   = $('dm-ico');
const vmWrap  = $('vm-wrap');
const vmBtn   = $('vm-btn');

// Watch page DOM refs
const homePage  = $('home-page');
const watchPage = $('watch-page');
const backBtn   = $('back-btn');
const wCrumb    = $('w-crumb');
const vFrame    = $('v-frame');
const vEmpty    = $('v-empty');
const srcPick   = $('src-pick');
const dubTog    = $('dub-tog');
const extLink   = $('ext-link');
const wInfo     = $('w-info');
const wSynWrap  = $('w-syn-wrap');
const wSyn      = $('w-syn');
const epNav     = $('ep-nav');
const epList    = $('ep-list');
const epCount   = $('ep-count');
const epJump    = $('ep-jump');

// ─── DARK MODE ───────────────────────────────────────────────────────────────
let dark = document.documentElement.hasAttribute('data-theme');

function updateDmIcon() {
  if (dark) {
    dmIco.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  } else {
    dmIco.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
  }
}

function toggleDark() {
  dark = !dark;
  if (dark) {
    document.documentElement.setAttribute('data-theme', 'dark');
    if (lsOk) localStorage.setItem('hiw:dark', '1');
  } else {
    document.documentElement.removeAttribute('data-theme');
    if (lsOk) localStorage.removeItem('hiw:dark');
  }
  updateDmIcon();
}

updateDmIcon();
dmBtn.addEventListener('click', toggleDark);

// ─── LANGUAGE ────────────────────────────────────────────────────────────────
// Fast path: update titles of already-rendered cards in place instead of
// rebuilding the whole grid. Preserves scroll position and is essentially free.
function setLang(l) {
  lang = l;
  if (lsOk) localStorage.setItem('hiw:lang', l);
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('on', b.dataset.l === l)
  );

  // If we haven't rendered yet (e.g. empty state), nothing to update.
  if (!grid.querySelector('.card')) return;

  grid.querySelectorAll('.card').forEach(card => {
    const anime = card._anime;
    if (!anime) return;
    const t = getTitle(anime);
    const safeT = t.replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const titleEl = card.querySelector('.ctitle');
    if (titleEl) {
      titleEl.textContent = t;
      titleEl.title = t;
    }
    const fb = card.querySelector('.pfallback span');
    if (fb) fb.textContent = t.slice(0, 22);
    const cb = card.querySelector('input[type=checkbox]');
    if (cb) cb.setAttribute('aria-label', safeT + ' watched toggle');
  });
}

// Init lang button state
document.querySelectorAll('.lang-btn').forEach(b => {
  b.classList.toggle('on', b.dataset.l === lang);
  b.addEventListener('click', () => setLang(b.dataset.l));
});

// ─── NProgress ───────────────────────────────────────────────────────────────
function setProgress(pct) {
  npbar.style.transform = `scaleX(${pct/100})`;
  npbar.style.opacity   = pct >= 100 ? '0' : '1';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let _tTimer;
function toast(msg, type = 'ok') {
  $('t-msg').textContent = msg;
  const ico = $('t-ico');
  if (type === 'warn') {
    ico.innerHTML = `<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`;
  } else if (type === 'off') {
    ico.innerHTML = `<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>`;
  } else {
    ico.innerHTML = `<polyline points="20 6 9 17 4 12"/>`;
  }
  const t = $('toast');
  t.classList.add('on');
  clearTimeout(_tTimer);
  _tTimer = setTimeout(() => t.classList.remove('on'), 2600);
}

// ─── COUNTS ──────────────────────────────────────────────────────────────────
function updateCounts() {
  const total = allAnime.length;
  const wc    = allAnime.filter(a => watched[a.mal_id]).length;
  const uc    = total - wc;

  cAll.textContent      = total || '—';
  cWatched.textContent  = wc;
  cUnwatched.textContent= total ? uc : '—';

  if (total === 0) { stat.textContent = 'Loading…'; stat.className = 'stat'; return; }
  if (wc > 0) {
    stat.innerHTML = `<b>${wc}</b> / ${total} watched`;
    stat.className = 'stat green';
  } else {
    stat.textContent = `${total} anime`;
    stat.className = 'stat';
  }
}

// ─── CARD FACTORY ────────────────────────────────────────────────────────────
const EYE_ON  = `<svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_OFF = `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
const IMG_PH  = `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;

function makeCard(anime) {
  const isW    = !!watched[anime.mal_id];
  const score  = typeof anime.score === 'number' ? anime.score.toFixed(1) : null;
  const genre  = anime.genres?.[0]?.name || null;
  const eps    = anime.episodes ? `${anime.episodes} ep`
               : anime.status === 'Currently Airing' ? 'Airing' : null;
  const rank   = anime.popularity ?? null;
  const img    = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
  const title  = getTitle(anime);
  const safeT  = title.replace(/</g,'&lt;').replace(/"/g,'&quot;');

  const el = document.createElement('div');
  el.className = 'card' + (isW ? ' watched' : '');
  el.dataset.id = anime.mal_id;
  el._anime = anime; // reference for lang swap / toggle

  el.innerHTML = `
<div class="poster">
  ${img
    ? `<img src="${img}" alt="" loading="lazy" decoding="async">`
    : `<div class="pfallback">${IMG_PH}<span>${title.slice(0,20)}</span></div>`}
  <div class="veil"><div class="vcheck"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div></div>
  ${rank !== null ? `<span class="b-rank">#${rank}</span>` : ''}
  ${score !== null ? `<span class="b-score"><span class="s">★</span>${score}</span>` : ''}
</div>
<div class="cbody">
  <div class="ctitle" title="${safeT}">${title}</div>
  <div class="cmeta">
    ${genre ? `<span class="ctag">${genre}</span>` : ''}
    ${genre && eps ? `<span class="cdot"></span>` : ''}
    ${eps ? `<span class="ctag">${eps}</span>` : ''}
  </div>
  <div class="cdiv"></div>
  <div class="swrow">
    <span class="swlabel">${isW ? EYE_ON + ' Watched' : EYE_OFF + ' Unwatched'}</span>
    <label class="sw" title="${isW ? 'Mark as unwatched' : 'Mark as watched'}">
      <input type="checkbox" ${isW ? 'checked' : ''} aria-label="${safeT} watched toggle">
      <span class="trk"></span>
    </label>
  </div>
</div>`;

  if (img) {
    const imgEl = el.querySelector('img');
    imgEl.onload  = () => imgEl.classList.add('ok');
    imgEl.onerror = () => {
      imgEl.remove();
      const fb = document.createElement('div');
      fb.className = 'pfallback';
      fb.innerHTML = `${IMG_PH}<span style="font-size:10px;padding:0 8px;text-align:center">${title.slice(0,22)}</span>`;
      el.querySelector('.poster').prepend(fb);
    };
  }

  el.querySelector('input[type=checkbox]').addEventListener('change', e => {
    onToggle(anime, el, e.target.checked);
  });

  // Click anywhere on the card except the watched toggle opens the watch page.
  el.addEventListener('click', e => {
    if (e.target.closest('.sw')) return;
    navWatch(anime.mal_id, 1);
  });

  return el;
}

// ─── TOGGLE ──────────────────────────────────────────────────────────────────
function onToggle(anime, card, nowWatched) {
  const label = card.querySelector('.swlabel');

  if (nowWatched) {
    watched[anime.mal_id] = true;
    lsAdd(anime);
    card.classList.add('watched');
    label.innerHTML = EYE_ON + ' Watched';
    const t = getTitle(anime);
    toast(`"${t.length > 28 ? t.slice(0,28) + '…' : t}" marked as watched`);
  } else {
    delete watched[anime.mal_id];
    lsDel(anime.mal_id);
    card.classList.remove('watched');
    label.innerHTML = EYE_OFF + ' Unwatched';
  }

  updateCounts();

  // If this card no longer belongs in the current filtered view, animate
  // removal and update virtualization state in place (preserves scroll).
  if ((filter === 'watched' && !nowWatched) ||
      (filter === 'unwatched' && nowWatched)) {
    card.style.cssText += ';transition:opacity .28s,transform .28s;opacity:0;transform:scale(.95)';
    setTimeout(() => {
      card.remove();
      renderedCount = Math.max(0, renderedCount - 1);
      const idx = currentList.indexOf(anime);
      if (idx >= 0) currentList.splice(idx, 1);
      if (currentList.length === 0) {
        renderView();           // shows the friendly empty state
      } else {
        ensureSentinel();
      }
    }, 300);
  }
}

// ─── SKELETONS ───────────────────────────────────────────────────────────────
function addSkels(n = 12) {
  const frag = document.createDocumentFragment();
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'skel';
    s.innerHTML = `<div class="sk-p"></div><div class="sk-b"><div class="sk-l"></div><div class="sk-l w6"></div><div class="sk-l w4"></div></div>`;
    frag.appendChild(s);
  }
  grid.appendChild(frag);
}
function clearSkels() { grid.querySelectorAll('.skel').forEach(s => s.remove()); }

// ─── VIRTUALIZATION (the fix) ────────────────────────────────────────────────
// Previously every fetched card went straight into the DOM, so leaving the
// tab open slowly piled up thousands of nodes until the browser choked.
// Now we hold data in memory, render a batch, and use a single
// IntersectionObserver on a "sentinel" div to render more only as the user
// scrolls. One observer lives for the page lifetime — no leaks.
const sentinelObs = new IntersectionObserver((entries) => {
  if (entries.some(e => e.isIntersecting)) renderMore();
}, { rootMargin: SENTINEL_MARGIN });

function addSentinel() {
  if (grid.querySelector('.sentinel')) return;
  const sent = document.createElement('div');
  sent.className = 'sentinel';
  grid.appendChild(sent);
  sentinelObs.observe(sent);
}

function removeSentinel() {
  const sent = grid.querySelector('.sentinel');
  if (sent) { sentinelObs.unobserve(sent); sent.remove(); }
}

function ensureSentinel() {
  if (renderedCount < currentList.length) addSentinel();
  else removeSentinel();
}

function renderMore() {
  removeSentinel(); // will re-add if needed
  const end = Math.min(renderedCount + BATCH_SIZE, currentList.length);
  if (end <= renderedCount) return;

  const frag = document.createDocumentFragment();
  for (let i = renderedCount; i < end; i++) {
    frag.appendChild(makeCard(currentList[i]));
  }
  grid.appendChild(frag);
  renderedCount = end;

  ensureSentinel();
}

function computeFilteredList() {
  let list = allAnime;
  if (query) {
    const q = query.toLowerCase();
    list = list.filter(a =>
      a.title.toLowerCase().includes(q) ||
      (a.title_english  || '').toLowerCase().includes(q) ||
      (a.title_japanese || '').toLowerCase().includes(q)
    );
  }
  if (filter === 'watched')   list = list.filter(a => watched[a.mal_id]);
  if (filter === 'unwatched') list = list.filter(a => !watched[a.mal_id]);
  return list;
}

// Full re-render: used on filter change, search change, and transitions
// into/out of the empty state.
function renderView() {
  currentList = computeFilteredList();
  removeSentinel();
  grid.innerHTML = '';
  renderedCount = 0;

  if (currentList.length === 0) {
    const msgs = {
      watched:   ['Nothing watched yet',   'Toggle the switch on any anime card.'],
      unwatched: ['All caught up!',         'You\'ve watched everything visible.'],
      all:       ['No results',             `No anime matched "${query}".`]
    };
    const [h, p] = msgs[filter] || msgs.all;
    grid.innerHTML = `<div class="empty"><div class="eico">${IMG_PH}</div><h3>${h}</h3><p>${p}</p></div>`;
    return;
  }

  renderMore();
}

// Called after each fetched page: keep currentList fresh without a full
// rebuild. If nothing is rendered yet we do the first render; otherwise we
// just make sure the sentinel is there so new data becomes scroll-accessible.
function onFetchApplied() {
  if (filter === 'all' && !query) {
    currentList = allAnime;
    if (renderedCount === 0) renderMore();
    else ensureSentinel();
  } else {
    const prev = currentList.length;
    currentList = computeFilteredList();
    if (renderedCount === 0 && currentList.length > 0) {
      // We were showing the empty state; swap it out for real cards.
      grid.innerHTML = '';
      renderMore();
    } else if (currentList.length > prev) {
      ensureSentinel();
    }
  }
}

// ─── WATCH PAGE ──────────────────────────────────────────────────────────────
// Streaming sources. `embed` returns an iframe URL for in-page playback, or
// null if that site blocks embedding (X-Frame-Options / CSP frame-ancestors).
// `external` is always present — it's where "Open externally" and the
// non-embeddable fallback send the user.
//
// Streaming sites rename/relaunch constantly. If one stops working: swap its
// URL builder here and nothing else changes. The first source with a non-null
// `embed` becomes the default.
const SOURCES = [
  {
    // Built for iframe embedding. Anime pattern uses a MAL-prefixed id.
    id: 'vidsrc', label: 'VidSrc',
    embed:    (a, ep, dub) => `https://vidsrc.cc/v2/embed/anime/ani${a.mal_id}/${ep}/${dub ? 'dub' : 'sub'}`,
    external: (a, ep, dub) => `https://vidsrc.cc/v2/embed/anime/ani${a.mal_id}/${ep}/${dub ? 'dub' : 'sub'}`
  },
  {
    // Another embed-first aggregator.
    id: '2embed', label: '2Embed',
    embed:    (a, ep) => `https://www.2embed.cc/embedanime/${a.mal_id}&ep=${ep}`,
    external: (a, ep) => `https://www.2embed.cc/embedanime/${a.mal_id}&ep=${ep}`
  },
  {
    // Miruro has a great UI but sets X-Frame-Options: sameorigin, so we can
    // only link out, never embed.
    id: 'miruro', label: 'Miruro',
    embed:    null,
    external: (a, ep, dub) => `https://www.miruro.to/watch?id=${a.mal_id}&ep=${ep}${dub ? '&type=dub' : ''}`
  },
  {
    // HiAnime also blocks embedding. We fall back to title search.
    id: 'hianime', label: 'HiAnime',
    embed:    null,
    external: (a)  => `https://hianime.to/search?keyword=${encodeURIComponent(a.title)}`
  }
];

// Default to the first source that can actually embed. If the user previously
// picked a non-embedding source we still honor it (they made that choice),
// but first-time visitors get a working iframe.
const DEFAULT_SOURCE = (SOURCES.find(s => s.embed) || SOURCES[0]).id;
let currentSource = DEFAULT_SOURCE;
const _savedSrc = lsOk && localStorage.getItem('hiw:source');
if (_savedSrc && SOURCES.find(s => s.id === _savedSrc)) currentSource = _savedSrc;
let currentDub = (lsOk && localStorage.getItem('hiw:dub') === '1');

const CHECK_SVG = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;

// Small cache for anime fetched by ID via deep-links (e.g. someone lands on
// #/watch/5 without the grid having scrolled to it yet).
const animeById = new Map();

// Active watch state. Kept simple — reroute rebuilds from this.
let wAnime  = null;
let wEp     = 1;

function escHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── ROUTING ─────────────────────────────────────────────────────────────────
// Hash routes: "" or "#/" = home, "#/watch/{mal_id}" or "#/watch/{mal_id}/{ep}"
// = watch page. Everything reacts to hashchange so Back/Forward buttons work.
function parseRoute() {
  const h = location.hash.replace(/^#\/?/, '');
  if (h.startsWith('watch/')) {
    const parts = h.split('/');
    return { page: 'watch', malId: Number(parts[1]), ep: Math.max(1, Number(parts[2]) || 1) };
  }
  return { page: 'home' };
}

function navHome() {
  // Using history so Back from the list doesn't return to /watch.
  if (location.hash) history.pushState('', '', location.pathname + location.search);
  onRouteChange();
}

function navWatch(malId, ep = 1) {
  const next = `#/watch/${malId}/${ep}`;
  if (location.hash === next) onRouteChange();
  else location.hash = next;
}

async function onRouteChange() {
  const r = parseRoute();
  if (r.page === 'watch' && r.malId) {
    document.body.classList.add('watching');
    // Keep the header's filter tabs hidden via the body class.
    try {
      const anime = await resolveAnime(r.malId);
      renderWatch(anime, r.ep);
    } catch (e) {
      renderWatchError(r.malId);
    }
  } else {
    document.body.classList.remove('watching');
    // Stop any playing video when leaving the page.
    clearIframe();
    wAnime = null;
  }
}

async function resolveAnime(malId) {
  // Prefer what we already have in memory.
  const hit = allAnime.find(a => a.mal_id === malId) || animeById.get(malId);
  if (hit) return hit;

  // Otherwise fetch full details from Jikan. Covers direct links.
  const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}/full`);
  if (!res.ok) throw new Error('not_found');
  const j = await res.json();
  animeById.set(malId, j.data);
  return j.data;
}

window.addEventListener('hashchange', onRouteChange);

// ─── RENDER WATCH PAGE ───────────────────────────────────────────────────────
function renderWatch(anime, ep) {
  wAnime = anime;
  wEp    = ep;

  // Breadcrumb
  const t = getTitle(anime);
  wCrumb.innerHTML = `<b>${escHTML(t)}</b> · Episode ${ep}`;

  // Info panel
  const img = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
  const bits = [];
  if (anime.type) bits.push(anime.type);
  const yr = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : null);
  if (yr) bits.push(yr);
  if (anime.episodes) bits.push(`${anime.episodes} episodes`);
  else if (anime.status === 'Currently Airing') bits.push('Airing');
  if (typeof anime.score === 'number') bits.push(`★ ${anime.score.toFixed(2)}`);

  const chips = [];
  if (watched[anime.mal_id]) {
    chips.push(`<span class="w-chip wd" id="w-chip-wd" title="Mark as unwatched">${CHECK_SVG} Watched</span>`);
  } else {
    chips.push(`<span class="w-chip add" id="w-chip-wd" title="Mark as watched">+ Mark watched</span>`);
  }
  (anime.genres || []).slice(0, 5).forEach(g => {
    chips.push(`<span class="w-chip">${escHTML(g.name)}</span>`);
  });

  wInfo.innerHTML = `
    ${img ? `<div class="w-info-poster"><img src="${escHTML(img)}" alt=""></div>` : ''}
    <div class="w-info-body">
      <div class="w-info-ep">Episode ${ep}${anime.episodes ? ` of ${anime.episodes}` : ''}</div>
      <div class="w-title">${escHTML(t)}</div>
      <div class="w-sub">${bits.join(' · ')}</div>
      <div class="w-chips">${chips.join('')}</div>
    </div>`;

  // Watched toggle from within the watch page
  const wd = $('w-chip-wd');
  if (wd) wd.addEventListener('click', () => toggleWatchedFromWatchPage(anime));

  // Synopsis
  const syn = (anime.synopsis || '').trim();
  if (syn) {
    wSynWrap.style.display = '';
    const clamp = syn.length > 320;
    wSyn.className = 'w-syn' + (clamp ? ' clamp' : '');
    wSyn.textContent = syn;
    // Re-wire read-more (remove prior button if any)
    const prev = $('w-more-btn');
    if (prev) prev.remove();
    if (clamp) {
      const btn = document.createElement('button');
      btn.className = 'w-more';
      btn.id = 'w-more-btn';
      btn.textContent = 'Read more';
      btn.addEventListener('click', () => {
        wSyn.classList.remove('clamp');
        btn.remove();
      });
      wSynWrap.appendChild(btn);
    }
  } else {
    wSynWrap.style.display = 'none';
  }

  // Sources. External-only ones get a small "↗" so the user knows they'll
  // jump out of the page rather than embed.
  const EXT_ICO = `<svg class="src-ext-ico" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
  srcPick.innerHTML = SOURCES.map(s =>
    `<button class="src-btn${s.id === currentSource ? ' on' : ''}${!s.embed ? ' ext' : ''}" data-s="${s.id}">${s.label}${!s.embed ? EXT_ICO : ''}</button>`
  ).join('');

  // Dub toggle UI
  dubTog.querySelectorAll('button').forEach(b => {
    const isDub = b.dataset.d === 'dub';
    b.classList.toggle('on', isDub === currentDub);
  });

  // Episode list
  buildEpisodeList(anime, ep);

  // Prev/Next buttons
  buildEpNav(anime, ep);

  // Load video
  loadVideo();

  // Reset scroll to top of watch page
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function renderWatchError(malId) {
  wCrumb.innerHTML = `<b>Not found</b>`;
  wInfo.innerHTML = `<div class="w-info-body"><div class="w-title">Couldn't load anime #${malId}</div><div class="w-sub">Check your connection and try again, or head back to the list.</div></div>`;
  wSynWrap.style.display = 'none';
  srcPick.innerHTML = '';
  epNav.innerHTML = '';
  epList.innerHTML = '';
  epCount.textContent = '—';
  clearIframe();
}

function buildEpisodeList(anime, activeEp) {
  const n = anime.episodes;
  epCount.textContent = n || '—';

  if (n && n > 0) {
    // Single long string is much cheaper than appending N nodes.
    let s = '';
    for (let i = 1; i <= n; i++) {
      s += `<button class="ep-item${i === activeEp ? ' on' : ''}" data-ep="${i}">${i}</button>`;
    }
    epList.innerHTML = s;
    epJump.max = n;
  } else {
    const airing = anime.status === 'Currently Airing';
    epList.innerHTML = `
      <div class="ep-empty" style="grid-column:1/-1">
        <div>Episode count unknown${airing ? ' — currently airing' : ''}.</div>
        <div class="ep-input-wrap">
          <input class="ep-input" id="ep-free" type="number" min="1" value="${activeEp}">
          <button class="btn solid" id="ep-free-go">Watch</button>
        </div>
      </div>`;
    epJump.max = '';
    const go = $('ep-free-go'), inp = $('ep-free');
    if (go && inp) {
      const run = () => navWatch(anime.mal_id, Math.max(1, Math.floor(Number(inp.value) || 1)));
      go.addEventListener('click', run);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
    }
  }
}

function buildEpNav(anime, ep) {
  const max = anime.episodes || Infinity;
  const prevDisabled = ep <= 1;
  const nextDisabled = ep >= max;
  epNav.innerHTML = `
    <button id="ep-prev" ${prevDisabled ? 'disabled' : ''}>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Previous
    </button>
    <button id="ep-next" ${nextDisabled ? 'disabled' : ''}>
      Next
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;
  const prev = $('ep-prev'), next = $('ep-next');
  if (prev && !prevDisabled) prev.addEventListener('click', () => navWatch(anime.mal_id, ep - 1));
  if (next && !nextDisabled) next.addEventListener('click', () => navWatch(anime.mal_id, ep + 1));
}

function loadVideo() {
  if (!wAnime) return;
  const src = SOURCES.find(s => s.id === currentSource) || SOURCES[0];

  // Always update the external link regardless of whether we embed.
  const extUrl = src.external(wAnime, wEp, currentDub);
  extLink.href = extUrl;
  extLink.style.display = '';

  if (src.embed) {
    const url = src.embed(wAnime, wEp, currentDub);
    // Build iframe fresh each swap so we don't accumulate history inside it.
    vFrame.innerHTML = `
      <iframe src="${escHTML(url)}"
              allowfullscreen
              allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
              referrerpolicy="no-referrer"></iframe>`;
  } else {
    // Source doesn't allow iframe embedding — give a one-click way out.
    vFrame.innerHTML = `
      <div class="v-empty">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        <div><b>${escHTML(src.label)}</b> doesn't allow in-page embedding.</div>
        <a class="btn solid" href="${escHTML(extUrl)}" target="_blank" rel="noopener noreferrer" style="margin-top:4px">Open on ${escHTML(src.label)}</a>
        <div style="font-size:11.5px;opacity:.7;margin-top:2px">Or pick an embed-friendly source above ↑</div>
      </div>`;
  }
}

function clearIframe() {
  if (!vFrame) return;
  vFrame.innerHTML = `
    <div class="v-empty">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span>Pick an episode from the list to start watching</span>
    </div>`;
}

function toggleWatchedFromWatchPage(anime) {
  const isW = !!watched[anime.mal_id];
  if (isW) {
    delete watched[anime.mal_id];
    lsDel(anime.mal_id);
  } else {
    watched[anime.mal_id] = true;
    lsAdd(anime);
    toast('Marked as watched');
  }
  // Sync the home grid's card if present.
  const card = grid.querySelector(`.card[data-id="${anime.mal_id}"]`);
  if (card) {
    card.classList.toggle('watched', !isW);
    const cb = card.querySelector('input[type=checkbox]');
    if (cb) cb.checked = !isW;
    const lbl = card.querySelector('.swlabel');
    if (lbl) lbl.innerHTML = (!isW)
      ? EYE_ON + ' Watched'
      : EYE_OFF + ' Unwatched';
  }
  updateCounts();
  // Re-render the chip area only, without rebuilding the whole page.
  renderWatch(anime, wEp);
}

// ─── EVENT WIRING FOR WATCH PAGE ─────────────────────────────────────────────
backBtn.addEventListener('click', navHome);

// Delegated listener for episode list — single handler for any N buttons.
epList.addEventListener('click', e => {
  const btn = e.target.closest('.ep-item');
  if (!btn || !wAnime) return;
  navWatch(wAnime.mal_id, Number(btn.dataset.ep));
});

// Jump-to-episode input
epJump.addEventListener('keydown', e => {
  if (e.key !== 'Enter' || !wAnime) return;
  const n = Math.max(1, Math.floor(Number(epJump.value) || 1));
  const cap = wAnime.episodes || n;
  navWatch(wAnime.mal_id, Math.min(n, cap));
  epJump.value = '';
});

// Source picker (delegated; srcPick is rebuilt on every renderWatch)
srcPick.addEventListener('click', e => {
  const btn = e.target.closest('.src-btn');
  if (!btn) return;
  currentSource = btn.dataset.s;
  if (lsOk) localStorage.setItem('hiw:source', currentSource);
  srcPick.querySelectorAll('.src-btn').forEach(x =>
    x.classList.toggle('on', x.dataset.s === currentSource)
  );
  loadVideo();
});

// Dub / Sub toggle
dubTog.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  currentDub = btn.dataset.d === 'dub';
  if (lsOk) localStorage.setItem('hiw:dub', currentDub ? '1' : '0');
  dubTog.querySelectorAll('button').forEach(b =>
    b.classList.toggle('on', (b.dataset.d === 'dub') === currentDub)
  );
  loadVideo();
});


// ─── FETCH ALL ───────────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function fetchPg(pg, attempt = 0) {
  try {
    const res = await fetch(`https://api.jikan.moe/v4/top/anime?filter=bypopularity&limit=25&page=${pg}`);
    if (res.status === 429) {
      if (attempt >= MAX_RETRY) throw Object.assign(new Error('rate_limit'), { code: 429 });
      const wait = 1200 * (attempt + 1);
      errMsg.textContent = `Rate limited — retrying in ${wait/1000}s… (${attempt+1}/${MAX_RETRY})`;
      bErr.classList.add('on');
      await sleep(wait);
      bErr.classList.remove('on');
      return fetchPg(pg, attempt + 1);
    }
    if (!res.ok) throw Object.assign(new Error('http'), { code: res.status });
    bErr.classList.remove('on');
    return res.json();
  } catch (e) {
    if (e.code === 429) throw e;
    if (attempt < MAX_RETRY && navigator.onLine !== false) {
      await sleep(800 * (attempt + 1));
      return fetchPg(pg, attempt + 1);
    }
    throw e;
  }
}

async function loadAll(startPg = 1, endPg = MAX_PAGES) {
  aborted = false;
  lprog.classList.add('on');
  if (renderedCount === 0) addSkels(12);
  setProgress(2);
  vmWrap.classList.remove('on');
  totalPg = null; // recomputed per call against the current chunk's endPg

  let pg = startPg, hasMore = true;
  let capHit = false;

  try {
    while (hasMore && !aborted && pg <= endPg) {
      const json = await fetchPg(pg);
      const items = (json.data || []).filter(a => {
        if (seenIds.has(a.mal_id)) return false;
        seenIds.add(a.mal_id);
        return true;
      });

      const apiHasMore = json.pagination?.has_next_page ?? false;

      // Clamp the displayed total to whichever comes first: the API's real
      // last page, or this chunk's endPg.
      if (!totalPg && json.pagination?.last_visible_page) {
        totalPg = Math.min(json.pagination.last_visible_page, endPg);
      }

      // capHit = we stopped because we hit this chunk's ceiling, and the API
      // confirms there's more. That's the signal to show View More again.
      if (apiHasMore && pg >= endPg) capHit = true;
      hasMore = apiHasMore && pg < endPg;

      clearSkels();
      allAnime = allAnime.concat(items);

      onFetchApplied();     // virtualization-aware DOM update
      updateCounts();

      const cap = totalPg || endPg;
      const pct = Math.min(Math.round((pg / cap) * 100), 99);
      lfill.style.width = pct + '%';
      setProgress(pct);
      ltxt.textContent = `Loading… ${allAnime.length} of ~${cap * 25} anime (page ${pg}/${cap})`;

      pg++;
      if (hasMore) await sleep(FETCH_DELAY);
    }
  } catch(e) {
    clearSkels();
    if (e.code === 429) {
      errMsg.textContent = `Hit rate limit after ${allAnime.length} anime. Click Retry to continue from page ${pg}.`;
      bErr.classList.add('on');
    } else if (!navigator.onLine) {
      bOffline.classList.add('on');
    } else {
      errMsg.textContent = `Network error after ${allAnime.length} anime. Click Retry to continue.`;
      bErr.classList.add('on');
    }
    retryB.dataset.pg = pg;
    retryB.dataset.endpg = endPg;
    return;
  }

  clearSkels();
  lfill.style.width = '100%';
  setProgress(100);
  ltxt.textContent = `Done — ${allAnime.length} anime loaded`;
  setTimeout(() => { lprog.classList.remove('on'); setProgress(100); }, 1800);
  updateCounts();

  // If we stopped because this chunk's ceiling was hit (and there's more out
  // there), surface the View More button so the user can pull in the next 500.
  if (capHit && !aborted) {
    vmBtn.dataset.pg = pg;
    vmWrap.classList.add('on');
  }
}

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
function exportCSV() {
  const entries = Object.values(lsRead());
  if (!entries.length) { toast('Nothing watched to export yet', 'warn'); return; }

  const BOM  = '\uFEFF';
  const cols = ['Title','English Title','MAL ID','Status','Score','Episodes','Type','Genres','Watched At'];
  const rows = entries.map(e => [
    `"${(e.title           ||'').replace(/"/g,'""')}"`,
    `"${(e.title_english   ||'').replace(/"/g,'""')}"`,
    e.mal_id || '',
    'Completed',
    e.score    != null ? e.score    : '',
    e.episodes != null ? e.episodes : '',
    e.type || '',
    `"${(e.genres||[]).join(', ')}"`,
    e.watched_at ? e.watched_at.slice(0,10) : ''
  ].join(','));

  const csv  = BOM + [cols.join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `anime-watchlist-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast(`Exported ${entries.length} anime to CSV`);
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    if (filter === t.dataset.f) return; // no-op click
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    filter = t.dataset.f;
    renderView();
  });
});

// Debounced search — stops the grid from rebuilding on every keystroke.
let _searchTimer;
srch.addEventListener('input', () => {
  srchX.classList.toggle('on', srch.value.trim().length > 0);
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    const next = srch.value.trim();
    if (next === query) return;
    query = next;
    renderView();
  }, SEARCH_DEBOUNCE);
});

srchX.addEventListener('click', () => {
  srch.value = '';
  srchX.classList.remove('on');
  srch.focus();
  clearTimeout(_searchTimer);
  if (query !== '') {
    query = '';
    renderView();
  }
});

document.addEventListener('keydown', e => {
  // "/" focuses search, but only on the home page.
  if (e.key === '/' && document.activeElement !== srch && !document.body.classList.contains('watching')) {
    e.preventDefault(); srch.focus();
  }
  if (e.key === 'Escape') {
    // If we're on the watch page, Escape goes back to home.
    if (document.body.classList.contains('watching')) { navHome(); return; }
    if (document.activeElement === srch) srch.blur();
  }
});

expBtn.addEventListener('click', exportCSV);

retryB.addEventListener('click', () => {
  bErr.classList.remove('on');
  const pg    = Number(retryB.dataset.pg)    || 1;
  const endPg = Number(retryB.dataset.endpg) || MAX_PAGES;
  loadAll(pg, endPg);
});

// View More: load the next ~500 anime. If more remain after that, the button
// reappears at the end of the chunk.
vmBtn.addEventListener('click', () => {
  const pg = Number(vmBtn.dataset.pg) || (MAX_PAGES + 1);
  vmWrap.classList.remove('on');
  loadAll(pg, pg + CHUNK_PAGES - 1);
});

window.addEventListener('offline', () => bOffline.classList.add('on'));
window.addEventListener('online',  () => {
  bOffline.classList.remove('on');
  if (bErr.classList.contains('on')) {
    bErr.classList.remove('on');
    const pg    = Number(retryB.dataset.pg)    || 1;
    const endPg = Number(retryB.dataset.endpg) || MAX_PAGES;
    loadAll(pg, endPg);
  }
});

// Pause background fetching when the tab is hidden. Browsers already throttle
// this, but it's extra insurance for very long backgrounded sessions.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) aborted = true;
});

if (!lsOk) toast('Private mode — watched status won\'t persist across sessions', 'warn');

// ─── INIT ────────────────────────────────────────────────────────────────────
loadAll();
// Resolve any initial hash (deep-links like #/watch/21/3 should work on load).
onRouteChange();
</script>
</body>
</html>
