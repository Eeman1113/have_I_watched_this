<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Have I Watched This?</title>
<script>(function(){if(localStorage.getItem('hiw:dark')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:         hsl(0,0%,98%);
  --surface:    hsl(0,0%,100%);
  --surface2:   hsl(220,14%,96%);
  --surface3:   hsl(220,13%,93%);
  --border:     hsl(220,13%,90%);
  --border2:    hsl(220,13%,82%);
  --fg:         hsl(224,71%,4%);
  --fg2:        hsl(220,9%,38%);
  --fg3:        hsl(220,9%,56%);
  --green:      hsl(142,69%,42%);
  --green-bg:   hsl(142,76%,96%);
  --green-bd:   hsl(142,55%,82%);
  --green-fg:   hsl(142,72%,26%);
  --gold:       hsl(43,96%,48%);
  --warn-bg:    hsl(43,96%,95%);
  --warn-bd:    hsl(43,90%,76%);
  --warn-fg:    hsl(43,80%,22%);
  --err-bg:     hsl(0,86%,97%);
  --err-bd:     hsl(0,80%,85%);
  --err-fg:     hsl(0,72%,34%);
  --radius:     12px;
  --radius-sm:  8px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.05);
  --shadow:     0 4px 20px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
  --font:       'Poppins',ui-sans-serif,system-ui,sans-serif;
  --font-logo:  'Cedarville Cursive',cursive;
  --hdr-bg:     rgba(255,255,255,.88);
}

[data-theme="dark"]{
  --bg:         hsl(0,0%,4%);
  --surface:    hsl(0,0%,7%);
  --surface2:   hsl(0,0%,10%);
  --surface3:   hsl(0,0%,13%);
  --border:     hsl(0,0%,14%);
  --border2:    hsl(0,0%,22%);
  --fg:         hsl(0,0%,94%);
  --fg2:        hsl(0,0%,58%);
  --fg3:        hsl(0,0%,36%);
  --green:      hsl(142,52%,46%);
  --green-bg:   hsl(142,25%,8%);
  --green-bd:   hsl(142,32%,16%);
  --green-fg:   hsl(142,58%,56%);
  --gold:       hsl(43,95%,56%);
  --warn-bg:    hsl(43,30%,8%);
  --warn-bd:    hsl(43,40%,18%);
  --warn-fg:    hsl(43,85%,62%);
  --err-bg:     hsl(0,30%,8%);
  --err-bd:     hsl(0,38%,18%);
  --err-fg:     hsl(0,70%,60%);
  --shadow-sm:  0 1px 4px rgba(0,0,0,.6);
  --shadow:     0 6px 28px rgba(0,0,0,.7),0 1px 4px rgba(0,0,0,.4);
  --hdr-bg:     rgba(10,10,10,.92);
}

html{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
body{min-height:100vh}

/* ── NProgress ── */
#npbar{
  position:fixed;top:0;left:0;right:0;height:2px;background:var(--fg);
  transform-origin:left;transform:scaleX(0);opacity:1;
  transition:transform .3s ease,opacity .5s ease;z-index:9999;pointer-events:none;
}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:var(--hdr-bg);
  backdrop-filter:blur(16px) saturate(180%);
  border-bottom:1px solid var(--border);
  transition:background .2s,border-color .2s;
}
.hdr-inner{
  max-width:1460px;margin:0 auto;padding:0 24px;
  height:60px;display:flex;align-items:center;gap:12px;
}

/* ── LOGO ── */
.logo{
  font-family:var(--font-logo);font-size:19px;line-height:1;
  color:var(--fg);white-space:nowrap;flex-shrink:0;
  letter-spacing:0.02em;text-decoration:none;
  display:flex;align-items:baseline;gap:0;
}
.logo-q{opacity:.32;font-size:21px}

/* ── SEARCH ── */
.srch{position:relative;flex:1;max-width:340px;display:flex;align-items:center}
.srch-ico{position:absolute;left:11px;color:var(--fg3);pointer-events:none;display:flex}
.srch-ico svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round}
.srch-in{
  width:100%;height:36px;padding:0 32px 0 33px;
  font-family:var(--font);font-size:12.5px;font-weight:400;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface2);color:var(--fg);outline:none;
  transition:border-color .15s,box-shadow .15s,background .2s;
}
.srch-in:focus{
  border-color:var(--border2);background:var(--surface);
  box-shadow:0 0 0 3px rgba(0,0,0,.06);
}
[data-theme="dark"] .srch-in:focus{box-shadow:0 0 0 3px rgba(255,255,255,.06)}
.srch-in::placeholder{color:var(--fg3)}
.srch-x{
  position:absolute;right:10px;display:none;align-items:center;
  background:none;border:none;cursor:pointer;color:var(--fg3);
  padding:2px;border-radius:3px;transition:color .15s;
}
.srch-x svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round}
.srch-x:hover{color:var(--fg)}
.srch-x.on{display:flex}

/* ── HEADER RIGHT ── */
.hdr-r{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}

/* ── STAT ── */
.stat{
  font-size:11.5px;color:var(--fg2);padding:5px 12px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface2);
  white-space:nowrap;transition:all .2s;font-weight:400;
}
.stat b{color:var(--fg);font-weight:600}
.stat.green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-fg)}
.stat.green b{color:var(--green-fg)}

/* ── LANG PICKER ── */
.lang-pick{
  display:flex;align-items:center;
  border:1px solid var(--border);border-radius:20px;
  overflow:hidden;background:var(--surface2);
  transition:border-color .2s,background .2s;
  flex-shrink:0;
}
.lang-btn{
  font-family:var(--font);font-size:11px;font-weight:500;
  padding:5px 11px;cursor:pointer;border:none;
  background:transparent;color:var(--fg3);
  transition:all .15s;letter-spacing:0.05em;line-height:1;
}
.lang-btn.on{background:var(--fg);color:var(--bg);border-radius:20px}
.lang-btn:not(.on):hover{color:var(--fg)}

/* ── DARK MODE TOGGLE ── */
.dm-btn{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;color:var(--fg2);transition:all .15s;flex-shrink:0;
}
.dm-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.dm-btn:hover{background:var(--surface3);color:var(--fg);border-color:var(--border2)}

/* ── EXPORT BUTTON ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:36px;padding:0 16px;cursor:pointer;
  font-family:var(--font);font-size:12px;font-weight:500;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface);color:var(--fg);
  transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn:active{transform:scale(.98)}
.btn.solid{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.btn.solid:hover{opacity:.86}

/* ── FILTERS ── */
.fbar{border-bottom:1px solid var(--border);background:var(--surface);transition:background .2s,border-color .2s}
.fbar-inner{
  max-width:1460px;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;gap:4px;height:46px;
}
.tab{
  height:32px;padding:0 14px;
  font-family:var(--font);font-size:12px;font-weight:400;color:var(--fg3);
  border:1px solid transparent;border-radius:20px;
  background:transparent;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.tab:hover{background:var(--surface2);color:var(--fg)}
.tab.on{background:var(--fg);border-color:var(--fg);color:var(--bg);font-weight:500}
.cnt{
  font-size:10.5px;font-weight:500;
  padding:1px 7px;border-radius:10px;min-width:18px;text-align:center;
}
.tab.on .cnt{background:rgba(255,255,255,.2);color:inherit}
.tab:not(.on) .cnt{background:var(--surface3);color:var(--fg3);border:1px solid var(--border)}

/* ── MAIN ── */
.main{max-width:1460px;margin:0 auto;padding:24px 24px 80px}

/* ── BANNERS ── */
.banner{
  display:none;align-items:center;gap:8px;
  font-size:12px;padding:10px 14px;border-radius:var(--radius-sm);
  margin-bottom:16px;border:1px solid;font-weight:400;
}
.banner.on{display:flex}
.banner svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;flex-shrink:0}
.banner.warn{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn-fg)}
.banner.err{background:var(--err-bg);border-color:var(--err-bd);color:var(--err-fg)}
.banner-btn{
  margin-left:auto;font-family:var(--font);font-size:11px;cursor:pointer;
  background:none;border:1px solid;border-radius:20px;padding:3px 12px;
  font-weight:500;transition:background .15s;
}
.banner.err .banner-btn{border-color:var(--err-bd);color:var(--err-fg)}
.banner.err .banner-btn:hover{background:hsl(0,80%,94%)}
[data-theme="dark"] .banner.err .banner-btn:hover{background:hsl(0,25%,16%)}

/* ── LOAD PROGRESS ── */
.lprog{display:none;margin-bottom:20px}
.lprog.on{display:block}
.ltrack{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px}
.lfill{height:100%;width:0%;background:var(--fg);border-radius:2px;transition:width .35s ease}
.lstatus{font-size:11.5px;color:var(--fg3);display:flex;align-items:center;gap:6px}
.lstatus svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;animation:spin 1s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:12px}

/* ── CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:box-shadow .18s,border-color .18s,transform .18s;
  cursor:pointer;
}
.card:hover{box-shadow:var(--shadow);border-color:var(--border2);transform:translateY(-2px)}
.card.watched{border-color:var(--green-bd)}

.poster{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--surface2)}
.poster img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .35s}
.poster img.ok{opacity:1}
.pfallback{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:7px;color:var(--fg3);
  font-size:10px;text-align:center;padding:12px;
}
.pfallback svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;opacity:.28}

.b-rank,.b-score{
  position:absolute;top:8px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(4px);
  font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:20px;
  border:1px solid rgba(0,0,0,.06);line-height:1.6;
}
[data-theme="dark"] .b-rank,[data-theme="dark"] .b-score{
  background:rgba(0,0,0,.78);border-color:rgba(255,255,255,.08);color:white
}
.b-rank{left:8px;color:var(--fg2)}
.b-score{right:8px;color:var(--fg);display:flex;align-items:center;gap:2px}
.b-score .s{color:var(--gold)}

.veil{
  position:absolute;inset:0;background:rgba(0,0,0,.28);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.card.watched .veil{opacity:1}
.vcheck{
  width:40px;height:40px;border-radius:50%;background:white;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.vcheck svg{width:18px;height:18px;stroke:var(--green-fg);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ── CARD BODY ── */
.cbody{padding:10px 11px 11px}
.ctitle{
  font-size:12px;font-weight:500;line-height:1.45;color:var(--fg);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:6px;
}
.cmeta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.ctag{
  font-size:10px;color:var(--fg3);font-weight:400;
  background:var(--surface2);border:1px solid var(--border);
  padding:2px 8px;border-radius:20px;white-space:nowrap;
  max-width:120px;overflow:hidden;text-overflow:ellipsis;
}
.cdot{width:2px;height:2px;border-radius:50%;background:var(--border2);flex-shrink:0}
.cdiv{height:1px;background:var(--border);margin-bottom:10px}

/* ── SWITCH ROW ── */
.swrow{display:flex;align-items:center;justify-content:space-between}
.swlabel{
  font-size:11px;color:var(--fg3);display:flex;align-items:center;gap:5px;
  font-weight:400;transition:color .18s;
}
.swlabel svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.card.watched .swlabel{color:var(--green-fg)}

.sw{position:relative;display:inline-block;width:32px;height:18px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.trk{
  position:absolute;inset:0;cursor:pointer;
  background:var(--border2);border-radius:18px;transition:background .2s;
}
.trk::after{
  content:'';position:absolute;width:12px;height:12px;border-radius:50%;
  top:3px;left:3px;background:white;
  box-shadow:0 1px 2px rgba(0,0,0,.18);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
}
.sw input:checked+.trk{background:var(--green)}
.sw input:checked+.trk::after{transform:translateX(14px)}
.sw input:focus-visible+.trk{box-shadow:0 0 0 3px rgba(0,0,0,.1)}
[data-theme="dark"] .sw input:focus-visible+.trk{box-shadow:0 0 0 3px rgba(255,255,255,.14)}

/* ── SKELETON ── */
.skel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.sk-p{aspect-ratio:2/3;background:var(--surface2);position:relative;overflow:hidden}
.sk-p::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(128,128,128,.07),transparent);
  animation:shim 1.4s ease-in-out infinite;
}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sk-b{padding:10px 11px 11px}
.sk-l{height:9px;background:var(--surface2);border-radius:3px;margin-bottom:7px}
.sk-l.w6{width:60%}.sk-l.w4{width:40%}

/* ── EMPTY ── */
.empty{grid-column:1/-1;padding:80px 20px;text-align:center}
.eico{
  width:44px;height:44px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;color:var(--fg3);
}
.eico svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round}
.empty h3{font-size:13.5px;font-weight:500;color:var(--fg);margin-bottom:5px}
.empty p{font-size:12px;color:var(--fg3);max-width:240px;margin:0 auto;font-weight:400}

/* ── SENTINEL (virtualization trigger) ── */
.sentinel{grid-column:1/-1;height:1px;pointer-events:none;visibility:hidden}

/* ── VIEW MORE ── */
.vm-wrap{display:none;text-align:center;margin-top:28px}
.vm-wrap.on{display:block}

/* ── WATCH MODAL ── */
.mdl-wrap{
  position:fixed;inset:0;z-index:1000;
  display:none;align-items:center;justify-content:center;
  padding:20px;overflow-y:auto;
}
.mdl-wrap.on{display:flex}
.mdl-bd{
  position:absolute;inset:0;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  animation:fadeIn .2s ease;cursor:pointer;
}
[data-theme="dark"] .mdl-bd{background:rgba(0,0,0,.72)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

.mdl{
  position:relative;
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;box-shadow:var(--shadow);
  width:100%;max-width:860px;max-height:calc(100vh - 40px);
  display:flex;flex-direction:column;overflow:hidden;
  animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);
}

.mdl-x{
  position:absolute;top:12px;right:12px;z-index:3;
  width:30px;height:30px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--fg2);cursor:pointer;transition:all .15s;
}
.mdl-x:hover{background:var(--surface3);color:var(--fg)}
.mdl-x svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round}

.mdl-hero{
  display:flex;gap:20px;padding:22px 22px 18px;
  background:var(--surface2);border-bottom:1px solid var(--border);
}
.mdl-poster{
  width:132px;flex-shrink:0;aspect-ratio:2/3;
  border-radius:10px;overflow:hidden;
  background:var(--surface3);border:1px solid var(--border);
}
.mdl-poster img{width:100%;height:100%;object-fit:cover;display:block}
.mdl-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px;padding-right:30px}
.mdl-chips{display:flex;flex-wrap:wrap;gap:5px}
.mdl-chip{
  font-size:10.5px;color:var(--fg2);font-weight:400;
  background:var(--surface);border:1px solid var(--border);
  padding:3px 9px;border-radius:20px;
  display:inline-flex;align-items:center;gap:4px;
}
.mdl-chip.wd{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-fg);font-weight:500}
.mdl-chip.wd svg{width:10px;height:10px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.mdl-title{font-size:18px;font-weight:600;line-height:1.3;color:var(--fg);margin-top:2px}
.mdl-sub{font-size:12px;color:var(--fg3);line-height:1.5}

.mdl-body{padding:18px 22px 22px;overflow-y:auto;flex:1}

.mdl-synopsis{font-size:12.5px;color:var(--fg2);line-height:1.6}
.mdl-synopsis.clamp{
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
}
.mdl-more{
  font-size:11px;color:var(--fg3);cursor:pointer;
  background:none;border:none;padding:4px 0 0;
  font-family:var(--font);font-weight:500;
}
.mdl-more:hover{color:var(--fg)}

.mdl-section{margin-bottom:18px}
.mdl-section:last-child{margin-bottom:0}
.mdl-lbl{
  font-size:10.5px;font-weight:600;color:var(--fg3);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:9px;
}

.src-pick{display:flex;gap:6px;flex-wrap:wrap}
.src-btn{
  height:30px;padding:0 13px;
  font-family:var(--font);font-size:11.5px;font-weight:500;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface);color:var(--fg3);
  cursor:pointer;transition:all .15s;
}
.src-btn:hover{color:var(--fg);border-color:var(--border2)}
.src-btn.on{background:var(--fg);color:var(--bg);border-color:var(--fg)}

.ep-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:6px;
}
.ep-btn{
  aspect-ratio:1;font-family:var(--font);font-size:12px;font-weight:500;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--fg);
  cursor:pointer;transition:all .12s;
  display:flex;align-items:center;justify-content:center;
}
.ep-btn:hover{background:var(--fg);color:var(--bg);border-color:var(--fg);transform:translateY(-1px)}
.ep-btn:active{transform:translateY(0)}

.ep-custom{display:flex;gap:8px;align-items:center;margin-top:8px}
.ep-in{
  flex:1;max-width:120px;height:32px;padding:0 11px;
  font-family:var(--font);font-size:12px;
  border:1px solid var(--border);border-radius:20px;
  background:var(--surface2);color:var(--fg);outline:none;
  transition:border-color .15s,background .2s;
}
.ep-in:focus{border-color:var(--border2);background:var(--surface)}

  <svg id="t-ico" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="t-msg"></span>
</div>

<script>
// ─── STORAGE ─────────────────────────────────────────────────────────────────
// IMPORTANT: keep LS_KEY and data shape identical so existing users keep their
// saved watchlists across this update.
const LS_KEY = 'hiw:v3';
let lsOk = false;

(function checkLS(){
  try { localStorage.setItem('__t__','1'); localStorage.removeItem('__t__'); lsOk = true; }
  catch { lsOk = false; }
})();

function lsRead() {
  if (!lsOk) return {};
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
  catch { return {}; }
}

function lsWrite(obj) {
  if (!lsOk) return;
  try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); }
  catch(e) {
    if (e && (e.name === 'QuotaExceededError' || e.code === 22))
      toast('Storage full — some data may not persist', 'warn');
  }
}

function lsAdd(anime) {
  const d = lsRead();
  d[anime.mal_id] = {
    title:         anime.title,
    title_english: anime.title_english || null,
    mal_id:        anime.mal_id,
    score:         anime.score ?? null,
    episodes:      anime.episodes ?? null,
    type:          anime.type || null,
    genres:        (anime.genres || []).map(g => g.name),
    watched_at:    new Date().toISOString()
  };
  lsWrite(d);
}

function lsDel(id) {
  const d = lsRead();
  if (id in d) { delete d[id]; lsWrite(d); }
}

// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Tuning knobs for perf. These prevent the runaway-fetch + unbounded-DOM
// growth that was freezing tabs left alone.
const MAX_PAGES         = 40;    // cap API pagination for the initial load (~1000 top anime)
const CHUNK_PAGES       = 20;    // each "View More" click loads this many pages (~500 anime)
const BATCH_SIZE        = 60;    // cards rendered per virtualization batch
const SENTINEL_MARGIN   = '1500px 0px'; // preload next batch well before visible
const SEARCH_DEBOUNCE   = 180;   // ms — smooths live search typing
const FETCH_DELAY       = 420;   // ms between pages (unchanged)
const MAX_RETRY         = 3;

// ─── STATE ───────────────────────────────────────────────────────────────────
let allAnime = [];
let watched  = {};
let filter   = 'all';
let query    = '';
let seenIds  = new Set();
let totalPg  = null;
let aborted  = false;

// Virtualization state
let currentList   = [];  // filter/search-matched view of allAnime
let renderedCount = 0;   // how many cards are actually in the DOM

// Language state
let lang = (lsOk && localStorage.getItem('hiw:lang')) || 'en';

// Pre-load watched state from storage (unchanged data shape)
(function(){
  const d = lsRead();
  Object.keys(d).forEach(id => { watched[id] = true; });
})();

// ─── LANGUAGE HELPER ─────────────────────────────────────────────────────────
function getTitle(anime) {
  if (lang === 'en') return anime.title_english || anime.title;
  if (lang === 'ja') return anime.title_japanese || anime.title;
  return anime.title;
}

// ─── DOM ─────────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const grid    = $('grid');
const lprog   = $('lprog');
const lfill   = $('lfill');
const ltxt    = $('ltxt');
const stat    = $('stat');
const expBtn  = $('exp-btn');
const srch    = $('srch');
const srchX   = $('srch-x');
const bOffline= $('b-offline');
const bErr    = $('b-err');
const errMsg  = $('err-msg');
const retryB  = $('retry');
const npbar   = $('npbar');
const cAll    = $('c-all');
const cWatched= $('c-watched');
const cUnwatched = $('c-unwatched');
const dmBtn   = $('dm-btn');
const dmIco   = $('dm-ico');
const vmWrap  = $('vm-wrap');
const vmBtn   = $('vm-btn');
const mdl       = $('mdl');
const mdlBd     = $('mdl-bd');
const mdlX      = $('mdl-x');
const mdlPoster = $('mdl-poster');
const mdlTitle  = $('mdl-title');
const mdlSub    = $('mdl-sub');
const mdlChips  = $('mdl-chips');
const mdlBody   = $('mdl-body');

// ─── DARK MODE ───────────────────────────────────────────────────────────────
let dark = document.documentElement.hasAttribute('data-theme');

function updateDmIcon() {
  if (dark) {
    dmIco.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  } else {
    dmIco.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
  }
}

function toggleDark() {
  dark = !dark;
  if (dark) {
    document.documentElement.setAttribute('data-theme', 'dark');
    if (lsOk) localStorage.setItem('hiw:dark', '1');
  } else {
    document.documentElement.removeAttribute('data-theme');
    if (lsOk) localStorage.removeItem('hiw:dark');
  }
  updateDmIcon();
}

updateDmIcon();
dmBtn.addEventListener('click', toggleDark);

// ─── LANGUAGE ────────────────────────────────────────────────────────────────
// Fast path: update titles of already-rendered cards in place instead of
// rebuilding the whole grid. Preserves scroll position and is essentially free.
function setLang(l) {
  lang = l;
  if (lsOk) localStorage.setItem('hiw:lang', l);
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('on', b.dataset.l === l)
  );

  // If we haven't rendered yet (e.g. empty state), nothing to update.
  if (!grid.querySelector('.card')) return;

  grid.querySelectorAll('.card').forEach(card => {
    const anime = card._anime;
    if (!anime) return;
    const t = getTitle(anime);
    const safeT = t.replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const titleEl = card.querySelector('.ctitle');
    if (titleEl) {
      titleEl.textContent = t;
      titleEl.title = t;
    }
    const fb = card.querySelector('.pfallback span');
    if (fb) fb.textContent = t.slice(0, 22);
    const cb = card.querySelector('input[type=checkbox]');
    if (cb) cb.setAttribute('aria-label', safeT + ' watched toggle');
  });
}

// Init lang button state
document.querySelectorAll('.lang-btn').forEach(b => {
  b.classList.toggle('on', b.dataset.l === lang);
  b.addEventListener('click', () => setLang(b.dataset.l));
});

// ─── NProgress ───────────────────────────────────────────────────────────────
function setProgress(pct) {
  npbar.style.transform = `scaleX(${pct/100})`;
  npbar.style.opacity   = pct >= 100 ? '0' : '1';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let _tTimer;
function toast(msg, type = 'ok') {
  $('t-msg').textContent = msg;
  const ico = $('t-ico');
  if (type === 'warn') {
    ico.innerHTML = `<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`;
  } else if (type === 'off') {
    ico.innerHTML = `<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>`;
  } else {
    ico.innerHTML = `<polyline points="20 6 9 17 4 12"/>`;
  }
  const t = $('toast');
  t.classList.add('on');
  clearTimeout(_tTimer);
  _tTimer = setTimeout(() => t.classList.remove('on'), 2600);
}

// ─── COUNTS ──────────────────────────────────────────────────────────────────
function updateCounts() {
  const total = allAnime.length;
  const wc    = allAnime.filter(a => watched[a.mal_id]).length;
  const uc    = total - wc;

  cAll.textContent      = total || '—';
  cWatched.textContent  = wc;
  cUnwatched.textContent= total ? uc : '—';

  if (total === 0) { stat.textContent = 'Loading…'; stat.className = 'stat'; return; }
  if (wc > 0) {
    stat.innerHTML = `<b>${wc}</b> / ${total} watched`;
    stat.className = 'stat green';
  } else {
    stat.textContent = `${total} anime`;
    stat.className = 'stat';
  }
}

// ─── CARD FACTORY ────────────────────────────────────────────────────────────
const EYE_ON  = `<svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_OFF = `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
const IMG_PH  = `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;

function makeCard(anime) {
  const isW    = !!watched[anime.mal_id];
  const score  = typeof anime.score === 'number' ? anime.score.toFixed(1) : null;
  const genre  = anime.genres?.[0]?.name || null;
  const eps    = anime.episodes ? `${anime.episodes} ep`
               : anime.status === 'Currently Airing' ? 'Airing' : null;
  const rank   = anime.popularity ?? null;
  const img    = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
  const title  = getTitle(anime);
  const safeT  = title.replace(/</g,'&lt;').replace(/"/g,'&quot;');

  const el = document.createElement('div');
  el.className = 'card' + (isW ? ' watched' : '');
  el.dataset.id = anime.mal_id;
  el._anime = anime; // reference for lang swap / toggle

  el.innerHTML = `
<div class="poster">
  ${img
    ? `<img src="${img}" alt="" loading="lazy" decoding="async">`
    : `<div class="pfallback">${IMG_PH}<span>${title.slice(0,20)}</span></div>`}
  <div class="veil"><div class="vcheck"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div></div>
  ${rank !== null ? `<span class="b-rank">#${rank}</span>` : ''}
  ${score !== null ? `<span class="b-score"><span class="s">★</span>${score}</span>` : ''}
</div>
<div class="cbody">
  <div class="ctitle" title="${safeT}">${title}</div>
  <div class="cmeta">
    ${genre ? `<span class="ctag">${genre}</span>` : ''}
    ${genre && eps ? `<span class="cdot"></span>` : ''}
    ${eps ? `<span class="ctag">${eps}</span>` : ''}
  </div>
  <div class="cdiv"></div>
  <div class="swrow">
    <span class="swlabel">${isW ? EYE_ON + ' Watched' : EYE_OFF + ' Unwatched'}</span>
    <label class="sw" title="${isW ? 'Mark as unwatched' : 'Mark as watched'}">
      <input type="checkbox" ${isW ? 'checked' : ''} aria-label="${safeT} watched toggle">
      <span class="trk"></span>
    </label>
  </div>
</div>`;

  if (img) {
    const imgEl = el.querySelector('img');
    imgEl.onload  = () => imgEl.classList.add('ok');
    imgEl.onerror = () => {
      imgEl.remove();
      const fb = document.createElement('div');
      fb.className = 'pfallback';
      fb.innerHTML = `${IMG_PH}<span style="font-size:10px;padding:0 8px;text-align:center">${title.slice(0,22)}</span>`;
      el.querySelector('.poster').prepend(fb);
    };
  }

  el.querySelector('input[type=checkbox]').addEventListener('change', e => {
    onToggle(anime, el, e.target.checked);
  });

  // Click anywhere on the card except the watched toggle opens the watch modal.
  el.addEventListener('click', e => {
    if (e.target.closest('.sw')) return;
    openWatch(anime);
  });

  return el;
}

// ─── TOGGLE ──────────────────────────────────────────────────────────────────
function onToggle(anime, card, nowWatched) {
  const label = card.querySelector('.swlabel');

  if (nowWatched) {
    watched[anime.mal_id] = true;
    lsAdd(anime);
    card.classList.add('watched');
    label.innerHTML = EYE_ON + ' Watched';
    const t = getTitle(anime);
    toast(`"${t.length > 28 ? t.slice(0,28) + '…' : t}" marked as watched`);
  } else {
    delete watched[anime.mal_id];
    lsDel(anime.mal_id);
    card.classList.remove('watched');
    label.innerHTML = EYE_OFF + ' Unwatched';
  }

  updateCounts();

  // If this card no longer belongs in the current filtered view, animate
  // removal and update virtualization state in place (preserves scroll).
  if ((filter === 'watched' && !nowWatched) ||
      (filter === 'unwatched' && nowWatched)) {
    card.style.cssText += ';transition:opacity .28s,transform .28s;opacity:0;transform:scale(.95)';
    setTimeout(() => {
      card.remove();
      renderedCount = Math.max(0, renderedCount - 1);
      const idx = currentList.indexOf(anime);
      if (idx >= 0) currentList.splice(idx, 1);
      if (currentList.length === 0) {
        renderView();           // shows the friendly empty state
      } else {
        ensureSentinel();
      }
    }, 300);
  }
}

// ─── SKELETONS ───────────────────────────────────────────────────────────────
function addSkels(n = 12) {
  const frag = document.createDocumentFragment();
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'skel';
    s.innerHTML = `<div class="sk-p"></div><div class="sk-b"><div class="sk-l"></div><div class="sk-l w6"></div><div class="sk-l w4"></div></div>`;
    frag.appendChild(s);
  }
  grid.appendChild(frag);
}
function clearSkels() { grid.querySelectorAll('.skel').forEach(s => s.remove()); }

// ─── VIRTUALIZATION (the fix) ────────────────────────────────────────────────
// Previously every fetched card went straight into the DOM, so leaving the
// tab open slowly piled up thousands of nodes until the browser choked.
// Now we hold data in memory, render a batch, and use a single
// IntersectionObserver on a "sentinel" div to render more only as the user
// scrolls. One observer lives for the page lifetime — no leaks.
const sentinelObs = new IntersectionObserver((entries) => {
  if (entries.some(e => e.isIntersecting)) renderMore();
}, { rootMargin: SENTINEL_MARGIN });

function addSentinel() {
  if (grid.querySelector('.sentinel')) return;
  const sent = document.createElement('div');
  sent.className = 'sentinel';
  grid.appendChild(sent);
  sentinelObs.observe(sent);
}

function removeSentinel() {
  const sent = grid.querySelector('.sentinel');
  if (sent) { sentinelObs.unobserve(sent); sent.remove(); }
}

function ensureSentinel() {
  if (renderedCount < currentList.length) addSentinel();
  else removeSentinel();
}

function renderMore() {
  removeSentinel(); // will re-add if needed
  const end = Math.min(renderedCount + BATCH_SIZE, currentList.length);
  if (end <= renderedCount) return;

  const frag = document.createDocumentFragment();
  for (let i = renderedCount; i < end; i++) {
    frag.appendChild(makeCard(currentList[i]));
  }
  grid.appendChild(frag);
  renderedCount = end;

  ensureSentinel();
}

function computeFilteredList() {
  let list = allAnime;
  if (query) {
    const q = query.toLowerCase();
    list = list.filter(a =>
      a.title.toLowerCase().includes(q) ||
      (a.title_english  || '').toLowerCase().includes(q) ||
      (a.title_japanese || '').toLowerCase().includes(q)
    );
  }
  if (filter === 'watched')   list = list.filter(a => watched[a.mal_id]);
  if (filter === 'unwatched') list = list.filter(a => !watched[a.mal_id]);
  return list;
}

// Full re-render: used on filter change, search change, and transitions
// into/out of the empty state.
function renderView() {
  currentList = computeFilteredList();
  removeSentinel();
  grid.innerHTML = '';
  renderedCount = 0;

  if (currentList.length === 0) {
    const msgs = {
      watched:   ['Nothing watched yet',   'Toggle the switch on any anime card.'],
      unwatched: ['All caught up!',         'You\'ve watched everything visible.'],
      all:       ['No results',             `No anime matched "${query}".`]
    };
    const [h, p] = msgs[filter] || msgs.all;
    grid.innerHTML = `<div class="empty"><div class="eico">${IMG_PH}</div><h3>${h}</h3><p>${p}</p></div>`;
    return;
  }

  renderMore();
}

// Called after each fetched page: keep currentList fresh without a full
// rebuild. If nothing is rendered yet we do the first render; otherwise we
// just make sure the sentinel is there so new data becomes scroll-accessible.
function onFetchApplied() {
  if (filter === 'all' && !query) {
    currentList = allAnime;
    if (renderedCount === 0) renderMore();
    else ensureSentinel();
  } else {
    const prev = currentList.length;
    currentList = computeFilteredList();
    if (renderedCount === 0 && currentList.length > 0) {
      // We were showing the empty state; swap it out for real cards.
      grid.innerHTML = '';
      renderMore();
    } else if (currentList.length > prev) {
      ensureSentinel();
    }
  }
}

// ─── WATCH MODAL ─────────────────────────────────────────────────────────────
// Streaming sources. Each builder returns the URL to open for a given
// anime + episode. Streaming sites rename/move often; if one breaks, swap the
// builder here. Miruro supports direct MAL deep-linking with episode; the
// others fall back to a title search since they don't expose MAL routing.
const SOURCES = [
  { id: 'miruro',   label: 'Miruro',   build: (a, ep) => `https://www.miruro.to/watch?id=${a.mal_id}&ep=${ep}` },
  { id: 'hianime',  label: 'HiAnime',  build: (a)     => `https://hianime.to/search?keyword=${encodeURIComponent(a.title)}` },
  { id: 'allanime', label: 'AllAnime', build: (a)     => `https://allanime.to/search?q=${encodeURIComponent(a.title)}` }
];
let currentSource = (lsOk && localStorage.getItem('hiw:source')) || 'miruro';
if (!SOURCES.find(s => s.id === currentSource)) currentSource = 'miruro';

let activeAnime = null;

const CHECK_SVG = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;

function escHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openWatch(anime) {
  activeAnime = anime;

  // Poster
  const img = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
  mdlPoster.innerHTML = img ? `<img src="${escHTML(img)}" alt="">` : '';

  // Title (respects language preference)
  mdlTitle.textContent = getTitle(anime);

  // Subtitle: type · year · episodes · score
  const bits = [];
  if (anime.type) bits.push(anime.type);
  const yr = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : null);
  if (yr) bits.push(yr);
  if (anime.episodes) bits.push(`${anime.episodes} episodes`);
  else if (anime.status === 'Currently Airing') bits.push('Airing');
  if (typeof anime.score === 'number') bits.push(`★ ${anime.score.toFixed(2)}`);
  mdlSub.textContent = bits.join(' · ');

  // Chips: watched state + first few genres
  const chips = [];
  if (watched[anime.mal_id]) {
    chips.push(`<span class="mdl-chip wd">${CHECK_SVG} Watched</span>`);
  }
  (anime.genres || []).slice(0, 4).forEach(g => {
    chips.push(`<span class="mdl-chip">${escHTML(g.name)}</span>`);
  });
  mdlChips.innerHTML = chips.join('');

  // Body: synopsis + source picker + episodes
  const syn = (anime.synopsis || '').trim();
  const synHTML = syn
    ? `<div class="mdl-section">
         <div class="mdl-lbl">Synopsis</div>
         <p class="mdl-synopsis${syn.length > 280 ? ' clamp' : ''}" id="mdl-syn">${escHTML(syn)}</p>
         ${syn.length > 280 ? `<button class="mdl-more" id="mdl-more-btn">Read more</button>` : ''}
       </div>`
    : '';

  const srcHTML = `
    <div class="mdl-section">
      <div class="mdl-lbl">Streaming source</div>
      <div class="src-pick" id="src-pick">
        ${SOURCES.map(s =>
          `<button class="src-btn${s.id === currentSource ? ' on' : ''}" data-s="${s.id}">${s.label}</button>`
        ).join('')}
      </div>
    </div>`;

  // Episodes: explicit grid if known, otherwise a free-form input
  let epsHTML;
  const n = anime.episodes;
  if (n && n > 0) {
    let grid = '';
    for (let i = 1; i <= n; i++) grid += `<button class="ep-btn" data-ep="${i}">${i}</button>`;
    epsHTML = `
      <div class="mdl-section">
        <div class="mdl-lbl">Episodes (${n})</div>
        <div class="ep-grid" id="ep-grid">${grid}</div>
        <div class="mdl-note">Clicking an episode opens it in a new tab on the selected source.</div>
      </div>`;
  } else {
    const airing = anime.status === 'Currently Airing';
    epsHTML = `
      <div class="mdl-section">
        <div class="mdl-lbl">Episode</div>
        <div class="mdl-empty">Episode count unknown${airing ? ' — series is currently airing' : ''}.</div>
        <div class="ep-custom">
          <input class="ep-in" id="ep-in" type="number" min="1" value="1" placeholder="Ep #">
          <button class="btn solid" id="ep-go">Watch</button>
        </div>
      </div>`;
  }

  mdlBody.innerHTML = synHTML + srcHTML + epsHTML;
  mdl.classList.add('on');
  document.body.style.overflow = 'hidden';

  wireModal();
}

function closeWatch() {
  if (!mdl.classList.contains('on')) return;
  mdl.classList.remove('on');
  document.body.style.overflow = '';
  activeAnime = null;
}

function wireModal() {
  // Read-more expander
  const moreBtn = $('mdl-more-btn');
  if (moreBtn) {
    moreBtn.addEventListener('click', () => {
      $('mdl-syn').classList.remove('clamp');
      moreBtn.remove();
    });
  }

  // Source picker (persisted)
  document.querySelectorAll('.src-btn').forEach(b => {
    b.addEventListener('click', () => {
      currentSource = b.dataset.s;
      if (lsOk) localStorage.setItem('hiw:source', currentSource);
      document.querySelectorAll('.src-btn').forEach(x =>
        x.classList.toggle('on', x.dataset.s === currentSource)
      );
    });
  });

  // Episode grid — single delegated listener handles all N buttons
  const grid = $('ep-grid');
  if (grid) {
    grid.addEventListener('click', e => {
      const btn = e.target.closest('.ep-btn');
      if (btn) playEpisode(Number(btn.dataset.ep));
    });
  }

  // Free-form episode input (airing / unknown count)
  const go  = $('ep-go');
  const inp = $('ep-in');
  if (go && inp) {
    const run = () => {
      const n = Math.max(1, Math.floor(Number(inp.value) || 1));
      playEpisode(n);
    };
    go.addEventListener('click', run);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
  }
}

function playEpisode(ep) {
  if (!activeAnime) return;
  const src = SOURCES.find(s => s.id === currentSource) || SOURCES[0];
  const url = src.build(activeAnime, ep);
  window.open(url, '_blank', 'noopener,noreferrer');
  const t = getTitle(activeAnime);
  toast(`Opening ${t.length > 20 ? t.slice(0,20) + '…' : t} · Ep ${ep}`);
}

mdlX.addEventListener('click', closeWatch);
mdlBd.addEventListener('click', closeWatch);

// ─── FETCH ALL ───────────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function fetchPg(pg, attempt = 0) {
  try {
    const res = await fetch(`https://api.jikan.moe/v4/top/anime?filter=bypopularity&limit=25&page=${pg}`);
    if (res.status === 429) {
      if (attempt >= MAX_RETRY) throw Object.assign(new Error('rate_limit'), { code: 429 });
      const wait = 1200 * (attempt + 1);
      errMsg.textContent = `Rate limited — retrying in ${wait/1000}s… (${attempt+1}/${MAX_RETRY})`;
      bErr.classList.add('on');
      await sleep(wait);
      bErr.classList.remove('on');
      return fetchPg(pg, attempt + 1);
    }
    if (!res.ok) throw Object.assign(new Error('http'), { code: res.status });
    bErr.classList.remove('on');
    return res.json();
  } catch (e) {
    if (e.code === 429) throw e;
    if (attempt < MAX_RETRY && navigator.onLine !== false) {
      await sleep(800 * (attempt + 1));
      return fetchPg(pg, attempt + 1);
    }
    throw e;
  }
}

async function loadAll(startPg = 1, endPg = MAX_PAGES) {
  aborted = false;
  lprog.classList.add('on');
  if (renderedCount === 0) addSkels(12);
  setProgress(2);
  vmWrap.classList.remove('on');
  totalPg = null; // recomputed per call against the current chunk's endPg

  let pg = startPg, hasMore = true;
  let capHit = false;

  try {
    while (hasMore && !aborted && pg <= endPg) {
      const json = await fetchPg(pg);
      const items = (json.data || []).filter(a => {
        if (seenIds.has(a.mal_id)) return false;
        seenIds.add(a.mal_id);
        return true;
      });

      const apiHasMore = json.pagination?.has_next_page ?? false;

      // Clamp the displayed total to whichever comes first: the API's real
      // last page, or this chunk's endPg.
      if (!totalPg && json.pagination?.last_visible_page) {
        totalPg = Math.min(json.pagination.last_visible_page, endPg);
      }

      // capHit = we stopped because we hit this chunk's ceiling, and the API
      // confirms there's more. That's the signal to show View More again.
      if (apiHasMore && pg >= endPg) capHit = true;
      hasMore = apiHasMore && pg < endPg;

      clearSkels();
      allAnime = allAnime.concat(items);

      onFetchApplied();     // virtualization-aware DOM update
      updateCounts();

      const cap = totalPg || endPg;
      const pct = Math.min(Math.round((pg / cap) * 100), 99);
      lfill.style.width = pct + '%';
      setProgress(pct);
      ltxt.textContent = `Loading… ${allAnime.length} of ~${cap * 25} anime (page ${pg}/${cap})`;

      pg++;
      if (hasMore) await sleep(FETCH_DELAY);
    }
  } catch(e) {
    clearSkels();
    if (e.code === 429) {
      errMsg.textContent = `Hit rate limit after ${allAnime.length} anime. Click Retry to continue from page ${pg}.`;
      bErr.classList.add('on');
    } else if (!navigator.onLine) {
      bOffline.classList.add('on');
    } else {
      errMsg.textContent = `Network error after ${allAnime.length} anime. Click Retry to continue.`;
      bErr.classList.add('on');
    }
    retryB.dataset.pg = pg;
    retryB.dataset.endpg = endPg;
    return;
  }

  clearSkels();
  lfill.style.width = '100%';
  setProgress(100);
  ltxt.textContent = `Done — ${allAnime.length} anime loaded`;
  setTimeout(() => { lprog.classList.remove('on'); setProgress(100); }, 1800);
  updateCounts();

  // If we stopped because this chunk's ceiling was hit (and there's more out
  // there), surface the View More button so the user can pull in the next 500.
  if (capHit && !aborted) {
    vmBtn.dataset.pg = pg;
    vmWrap.classList.add('on');
  }
}

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
function exportCSV() {
  const entries = Object.values(lsRead());
  if (!entries.length) { toast('Nothing watched to export yet', 'warn'); return; }

  const BOM  = '\uFEFF';
  const cols = ['Title','English Title','MAL ID','Status','Score','Episodes','Type','Genres','Watched At'];
  const rows = entries.map(e => [
    `"${(e.title           ||'').replace(/"/g,'""')}"`,
    `"${(e.title_english   ||'').replace(/"/g,'""')}"`,
    e.mal_id || '',
    'Completed',
    e.score    != null ? e.score    : '',
    e.episodes != null ? e.episodes : '',
    e.type || '',
    `"${(e.genres||[]).join(', ')}"`,
    e.watched_at ? e.watched_at.slice(0,10) : ''
  ].join(','));

  const csv  = BOM + [cols.join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `anime-watchlist-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast(`Exported ${entries.length} anime to CSV`);
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    if (filter === t.dataset.f) return; // no-op click
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    filter = t.dataset.f;
    renderView();
  });
});

// Debounced search — stops the grid from rebuilding on every keystroke.
let _searchTimer;
srch.addEventListener('input', () => {
  srchX.classList.toggle('on', srch.value.trim().length > 0);
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    const next = srch.value.trim();
    if (next === query) return;
    query = next;
    renderView();
  }, SEARCH_DEBOUNCE);
});

srchX.addEventListener('click', () => {
  srch.value = '';
  srchX.classList.remove('on');
  srch.focus();
  clearTimeout(_searchTimer);
  if (query !== '') {
    query = '';
    renderView();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== srch && !mdl.classList.contains('on')) { e.preventDefault(); srch.focus(); }
  if (e.key === 'Escape') {
    if (mdl.classList.contains('on')) { closeWatch(); return; }
    if (document.activeElement === srch) srch.blur();
  }
});

expBtn.addEventListener('click', exportCSV);

retryB.addEventListener('click', () => {
  bErr.classList.remove('on');
  const pg    = Number(retryB.dataset.pg)    || 1;
  const endPg = Number(retryB.dataset.endpg) || MAX_PAGES;
  loadAll(pg, endPg);
});

// View More: load the next ~500 anime. If more remain after that, the button
// reappears at the end of the chunk.
vmBtn.addEventListener('click', () => {
  const pg = Number(vmBtn.dataset.pg) || (MAX_PAGES + 1);
  vmWrap.classList.remove('on');
  loadAll(pg, pg + CHUNK_PAGES - 1);
});

window.addEventListener('offline', () => bOffline.classList.add('on'));
window.addEventListener('online',  () => {
  bOffline.classList.remove('on');
  if (bErr.classList.contains('on')) {
    bErr.classList.remove('on');
    const pg    = Number(retryB.dataset.pg)    || 1;
    const endPg = Number(retryB.dataset.endpg) || MAX_PAGES;
    loadAll(pg, endPg);
  }
});

// Pause background fetching when the tab is hidden. Browsers already throttle
// this, but it's extra insurance for very long backgrounded sessions.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) aborted = true;
});

if (!lsOk) toast('Private mode — watched status won\'t persist across sessions', 'warn');

// ─── INIT ────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
